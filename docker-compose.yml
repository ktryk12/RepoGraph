services:

  api:
    build:
      context: .
      target: runtime
    container_name: repograph-api
    ports:
      - "8001:8001"
    volumes:
      - repograph_data:/data
    environment:
      REPOGRAPH_HOST: "0.0.0.0"
      REPOGRAPH_PORT: "8001"
      REPOGRAPH_DB_PATH: "/data/repograph"
      REPOGRAPH_DB_BACKEND: "cog"
      REPOGRAPH_TENANT_ID: "default"
      REPOGRAPH_REDIS_URL: "redis://redis:6379/0"
      REPOGRAPH_POSTGRES_DSN: "postgresql://repograph:repograph@postgres:5432/repograph"
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8001/status')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    restart: unless-stopped

  migrate:
    build:
      context: .
      target: runtime
    container_name: repograph-migrate
    command: ["repograph-migrate"]
    environment:
      REPOGRAPH_POSTGRES_DSN: "postgresql://repograph:repograph@postgres:5432/repograph"
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"

  redis:
    image: redis:7-alpine
    container_name: repograph-redis
    volumes:
      - redis_data:/data
    command: redis-server --save 60 1 --loglevel warning
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    container_name: repograph-postgres
    environment:
      POSTGRES_DB: repograph
      POSTGRES_USER: repograph
      POSTGRES_PASSWORD: repograph
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres/init.sql:/docker-entrypoint-initdb.d/01_init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U repograph -d repograph"]
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped

volumes:
  repograph_data:
  redis_data:
  postgres_data:
