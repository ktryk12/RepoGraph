apiVersion: v1
kind: Pod
metadata:
  name: repograph-pod
  labels:
    app: repograph
spec:
  restartPolicy: Always
  containers:
    - name: repograph-api
      image: localhost/repograph:latest
      ports:
        - containerPort: 8001
          hostPort: 8001
      env:
        - name: REPOGRAPH_HOST
          value: "0.0.0.0"
        - name: REPOGRAPH_PORT
          value: "8001"
        - name: REPOGRAPH_DB_PATH
          value: "/data/repograph"
        - name: REPOGRAPH_DB_BACKEND
          value: "cog"
        - name: REPOGRAPH_TENANT_ID
          value: "default"
        - name: REPOGRAPH_AUTOINDEX
          value: "lazy"
        - name: REPOGRAPH_AUTO_MIGRATE
          value: "1"
        - name: REPOGRAPH_MIGRATE_ATTEMPTS
          value: "30"
        - name: REPOGRAPH_MIGRATE_INTERVAL
          value: "2"
        - name: REPOGRAPH_REDIS_URL
          value: "redis://localhost:6379/0"
        - name: REPOGRAPH_POSTGRES_DSN
          value: "postgresql://repograph:repograph@localhost:5432/repograph"
      volumeMounts:
        - name: repograph-data
          mountPath: /data
      livenessProbe:
        httpGet:
          path: /status
          port: 8001
        initialDelaySeconds: 30
        periodSeconds: 10
        timeoutSeconds: 5
        failureThreshold: 6
      readinessProbe:
        httpGet:
          path: /status
          port: 8001
        initialDelaySeconds: 20
        periodSeconds: 5
        timeoutSeconds: 5
        failureThreshold: 12

    - name: redis
      image: docker.io/redis:7-alpine
      ports:
        - containerPort: 6379
      args: ["redis-server", "--save", "60", "1", "--loglevel", "warning"]
      volumeMounts:
        - name: redis-data
          mountPath: /data
      livenessProbe:
        exec:
          command: ["redis-cli", "ping"]
        initialDelaySeconds: 5
        periodSeconds: 5

    - name: postgres
      image: docker.io/postgres:16-alpine
      ports:
        - containerPort: 5432
      env:
        - name: POSTGRES_DB
          value: "repograph"
        - name: POSTGRES_USER
          value: "repograph"
        - name: POSTGRES_PASSWORD
          value: "repograph"
      volumeMounts:
        - name: postgres-data
          mountPath: /var/lib/postgresql/data
        - name: postgres-init
          mountPath: /docker-entrypoint-initdb.d/01_init.sql
          subPath: init.sql
          readOnly: true
      livenessProbe:
        exec:
          command: ["pg_isready", "-U", "repograph", "-d", "repograph"]
        initialDelaySeconds: 10
        periodSeconds: 10

  volumes:
    - name: repograph-data
      persistentVolumeClaim:
        claimName: repograph-data-pvc
    - name: redis-data
      persistentVolumeClaim:
        claimName: redis-data-pvc
    - name: postgres-data
      persistentVolumeClaim:
        claimName: postgres-data-pvc
    - name: postgres-init
      configMap:
        name: postgres-init-cm

---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: repograph-data-pvc
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 1Gi

---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: redis-data-pvc
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 100Mi

---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: postgres-data-pvc
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 1Gi

---
apiVersion: v1
kind: ConfigMap
metadata:
  name: postgres-init-cm
data:
  init.sql: |
    -- RepoGraph Postgres init — køres automatisk ved første containeropstart.
    -- Bootstrapper migration 001 + 002. API-starten anvender derefter alle
    -- nyere migrationer fra image'et, inklusive token-economy migration 003.

    -- Migrations tracking
    CREATE TABLE IF NOT EXISTS _schema_migrations (
        name       TEXT PRIMARY KEY,
        applied_at TIMESTAMPTZ DEFAULT NOW()
    );

    -- ============================================================
    -- 001: retrieval_traces
    -- ============================================================

    CREATE TABLE IF NOT EXISTS retrieval_traces (
        retrieval_id          TEXT        PRIMARY KEY,
        tenant_id             TEXT        NOT NULL,
        query                 TEXT,
        task_family           TEXT,
        token_budget          INTEGER,
        token_estimate        INTEGER,
        duration_ms           INTEGER,
        consumer              TEXT        DEFAULT 'generic',
        compressor_strategy   TEXT        DEFAULT 'none',
        pre_compress_tokens   INTEGER     DEFAULT 0,
        post_compress_tokens  INTEGER     DEFAULT 0,
        extra                 JSONB       DEFAULT '{}',
        persisted_at          TIMESTAMPTZ DEFAULT NOW()
    );

    CREATE INDEX IF NOT EXISTS idx_rt_tenant    ON retrieval_traces(tenant_id);
    CREATE INDEX IF NOT EXISTS idx_rt_family    ON retrieval_traces(task_family);
    CREATE INDEX IF NOT EXISTS idx_rt_persisted ON retrieval_traces(persisted_at DESC);
    CREATE INDEX IF NOT EXISTS idx_rt_strategy  ON retrieval_traces(compressor_strategy);

    -- ============================================================
    -- 002: task_memory, patches, test_failures, verifier_runs, usage_logs
    -- ============================================================

    CREATE TABLE IF NOT EXISTS task_memory (
        task_id         TEXT        PRIMARY KEY,
        tenant_id       TEXT        NOT NULL,
        query           TEXT,
        task_family     TEXT,
        working_set_id  TEXT,
        retrieval_id    TEXT,
        status          TEXT        DEFAULT 'open',
        flags           JSONB       DEFAULT '{}',
        created_at      TIMESTAMPTZ DEFAULT NOW(),
        updated_at      TIMESTAMPTZ DEFAULT NOW()
    );

    CREATE INDEX IF NOT EXISTS idx_tm_tenant ON task_memory(tenant_id);
    CREATE INDEX IF NOT EXISTS idx_tm_status ON task_memory(status);

    CREATE TABLE IF NOT EXISTS task_patches (
        id              BIGSERIAL   PRIMARY KEY,
        task_id         TEXT        NOT NULL REFERENCES task_memory(task_id) ON DELETE CASCADE,
        tenant_id       TEXT        NOT NULL,
        attempt         INTEGER     DEFAULT 1,
        diff            TEXT,
        result          TEXT        DEFAULT 'pending',
        failure_reason  TEXT,
        created_at      TIMESTAMPTZ DEFAULT NOW()
    );

    CREATE INDEX IF NOT EXISTS idx_tp_task ON task_patches(task_id);

    CREATE TABLE IF NOT EXISTS task_patch_symbols (
        id          BIGSERIAL PRIMARY KEY,
        patch_id    BIGINT    NOT NULL REFERENCES task_patches(id) ON DELETE CASCADE,
        symbol      TEXT      NOT NULL
    );

    CREATE INDEX IF NOT EXISTS idx_tps_patch ON task_patch_symbols(patch_id);

    CREATE TABLE IF NOT EXISTS task_test_failures (
        id              BIGSERIAL   PRIMARY KEY,
        task_id         TEXT        NOT NULL REFERENCES task_memory(task_id) ON DELETE CASCADE,
        tenant_id       TEXT        NOT NULL,
        test_file       TEXT,
        test_name       TEXT,
        error_summary   TEXT,
        created_at      TIMESTAMPTZ DEFAULT NOW()
    );

    CREATE INDEX IF NOT EXISTS idx_ttf_task ON task_test_failures(task_id);

    CREATE TABLE IF NOT EXISTS verifier_runs (
        id              BIGSERIAL   PRIMARY KEY,
        tenant_id       TEXT        NOT NULL,
        task_id         TEXT,
        repo_path       TEXT,
        steps           TEXT[]      DEFAULT '{}',
        passed          BOOLEAN,
        result_json     JSONB       DEFAULT '{}',
        duration_ms     INTEGER,
        created_at      TIMESTAMPTZ DEFAULT NOW()
    );

    CREATE INDEX IF NOT EXISTS idx_vr_task   ON verifier_runs(task_id);
    CREATE INDEX IF NOT EXISTS idx_vr_tenant ON verifier_runs(tenant_id);

    CREATE TABLE IF NOT EXISTS usage_logs (
        id              BIGSERIAL   PRIMARY KEY,
        tenant_id       TEXT        NOT NULL,
        model_id        TEXT,
        capability      TEXT,
        input_tokens    INTEGER,
        output_tokens   INTEGER,
        latency_ms      INTEGER,
        task_id         TEXT,
        routed_at       TIMESTAMPTZ DEFAULT NOW()
    );

    CREATE INDEX IF NOT EXISTS idx_ul_tenant ON usage_logs(tenant_id);
    CREATE INDEX IF NOT EXISTS idx_ul_model  ON usage_logs(model_id);
    CREATE INDEX IF NOT EXISTS idx_ul_routed ON usage_logs(routed_at DESC);

    -- Mark migrations as applied så repograph-migrate ikke genkører dem
    INSERT INTO _schema_migrations (name) VALUES
        ('001_retrieval_traces.sql'),
        ('002_task_memory.sql')
    ON CONFLICT (name) DO NOTHING;
