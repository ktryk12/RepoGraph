services:
  context-plane:
    build:
      context: .
      dockerfile: docker/Dockerfile.context-plane
    environment:
      PYTHONUTF8: "1"
      PYTHONDONTWRITEBYTECODE: "1"
      USE_CONTEXT_PLANE: "true"
      USE_CONTEXT_PLANE_REMOTE: "false"
      CONTEXT_PLANE_API_KEY: ${CONTEXT_PLANE_API_KEY:-dev-context-plane-key}
      CONTEXT_PLANE_STORE_BACKEND: ${CONTEXT_PLANE_STORE_BACKEND:-sqlite}
      CONTEXT_PLANE_DB_PATH: ${CONTEXT_PLANE_DB_PATH:-/app/artifacts/context_plane/index.db}
      CONTEXT_PLANE_REDIS_URL: ${CONTEXT_PLANE_REDIS_URL:-redis://redis:6379/3}
      CONTEXT_PLANE_REPO_ROOT: ${CONTEXT_PLANE_REPO_ROOT:-/workspace}
      CONTEXT_PLANE_INDEX_ON_STARTUP: ${CONTEXT_PLANE_INDEX_ON_STARTUP:-true}
      CONTEXT_PLANE_MAX_FILE_SIZE_KB: ${CONTEXT_PLANE_MAX_FILE_SIZE_KB:-100}
      CONTEXT_PLANE_EXCLUDE_PATTERNS: ${CONTEXT_PLANE_EXCLUDE_PATTERNS:-__pycache__,.git,node_modules,*.pyc}
      EXPERT_SERVING_BASE_URL: ${EXPERT_SERVING_BASE_URL:-http://expert-serving:8094}
      EXPERT_SERVING_API_KEY: ${EXPERT_SERVING_API_KEY:-dev-expert-serving-key}
      EXPERT_SERVING_TIMEOUT_SECONDS: ${EXPERT_SERVING_TIMEOUT_SECONDS:-60}
    volumes:
      - ./artifacts:/app/artifacts
      - ./:/workspace:ro
    ports:
      - "8092:8092"
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import sys, urllib.request; sys.exit(0 if urllib.request.urlopen('http://localhost:8092/health', timeout=2).getcode() == 200 else 1)",
        ]
      interval: 10s
      timeout: 3s
      retries: 6
      start_period: 10s

  tool-runtime:
    build:
      context: .
      dockerfile: docker/Dockerfile.tool-runtime
    environment:
      PYTHONUTF8: "1"
      PYTHONDONTWRITEBYTECODE: "1"
      TOOL_RUNTIME_API_KEY: ${TOOL_RUNTIME_API_KEY:-dev-tool-runtime-key}
    ports:
      - "8093:8093"
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import sys, urllib.request; sys.exit(0 if urllib.request.urlopen('http://localhost:8093/health', timeout=2).getcode() == 200 else 1)",
        ]
      interval: 10s
      timeout: 3s
      retries: 6
      start_period: 10s

  policy-validator:
    build:
      context: .
      dockerfile: docker/Dockerfile.policy-validator
    environment:
      PYTHONUTF8: "1"
      PYTHONDONTWRITEBYTECODE: "1"
      POLICY_VALIDATOR_API_KEY: ${POLICY_VALIDATOR_API_KEY:-dev-policy-validator-key}
    ports:
      - "8095:8095"
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import sys, urllib.request; sys.exit(0 if urllib.request.urlopen('http://localhost:8095/health', timeout=2).getcode() == 200 else 1)",
        ]
      interval: 10s
      timeout: 3s
      retries: 6
      start_period: 10s

  artifact-writer:
    build:
      context: .
      dockerfile: docker/Dockerfile.artifact-writer
    environment:
      PYTHONUTF8: "1"
      PYTHONDONTWRITEBYTECODE: "1"
      ARTIFACT_WRITER_API_KEY: ${ARTIFACT_WRITER_API_KEY:-dev-artifact-writer-key}
    ports:
      - "8096:8096"
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import sys, urllib.request; sys.exit(0 if urllib.request.urlopen('http://localhost:8096/health', timeout=2).getcode() == 200 else 1)",
        ]
      interval: 10s
      timeout: 3s
      retries: 6
      start_period: 10s

  expert-serving:
    build:
      context: .
      dockerfile: docker/Dockerfile.expert-serving
    environment:
      PYTHONUTF8: "1"
      PYTHONDONTWRITEBYTECODE: "1"
      USE_EXPERT_SERVING_REMOTE: "false"
      EXPERT_SERVING_MODEL_ID: ${EXPERT_SERVING_MODEL_ID:-repair_hint_ssrn}
      EXPERT_SERVING_MODELS_ROOT: ${EXPERT_SERVING_MODELS_ROOT:-models/production}
      EXPERT_SERVING_MODEL_PINNING_POLICY: ${EXPERT_SERVING_MODEL_PINNING_POLICY:-allow_latest}
      EXPERT_SERVING_MODEL_PIN_NAME: ${EXPERT_SERVING_MODEL_PIN_NAME:-production}
      EXPERT_SERVING_FAILURE_MODE: ${EXPERT_SERVING_FAILURE_MODE:-fallback_default}
      EXPERT_SERVING_LATENCY_BUDGET_MS: ${EXPERT_SERVING_LATENCY_BUDGET_MS:-30000}  # Danish 4.9 tok/s; raised from 1000 (2026-03-20)
      EXPERT_SERVING_DEFAULT_ACTION: ${EXPERT_SERVING_DEFAULT_ACTION:-request_context}
      EXPERT_SERVING_API_KEY: ${EXPERT_SERVING_API_KEY:-dev-expert-serving-key}
      MIXTRAL_BASE_URL: ${MIXTRAL_BASE_URL:-}
      CODESTRAL_BASE_URL: ${CODESTRAL_BASE_URL:-}
      MINDSET_BASE_URL: ${MINDSET_BASE_URL:-}
      ROUTER_BASE_URL: ${ROUTER_BASE_URL:-}
      NSFW_BASE_URL: ${NSFW_BASE_URL:-}
    ports:
      - "8094:8094"
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import sys, urllib.request; sys.exit(0 if urllib.request.urlopen('http://localhost:8094/health', timeout=2).getcode() == 200 else 1)",
        ]
      interval: 10s
      timeout: 3s
      retries: 6
      start_period: 10s

  aesa-api:
    build:
      context: .
      dockerfile: docker/Dockerfile.aesa-api
    environment:
      PYTHONUTF8: "1"
      PYTHONDONTWRITEBYTECODE: "1"
      AESA_BUS_BACKEND: ${AESA_BUS_BACKEND:-kafka}
      AESA_KAFKA_BOOTSTRAP: ${AESA_KAFKA_BOOTSTRAP:-kafka:9092}
      AESA_KAFKA_TOPIC: ${AESA_KAFKA_TOPIC:-aesa.events.v1}
      AESA_KAFKA_DLQ_TOPIC: ${AESA_KAFKA_DLQ_TOPIC:-aesa.events.v1.dlq}
      AESA_KAFKA_GROUP: ${AESA_KAFKA_GROUP:-aesa-api}
      USE_CONTEXT_PLANE: ${USE_CONTEXT_PLANE:-true}
      USE_CONTEXT_PLANE_REMOTE: ${USE_CONTEXT_PLANE_REMOTE:-true}
      CONTEXT_PLANE_BASE_URL: ${CONTEXT_PLANE_BASE_URL:-http://context-plane:8092}
      CONTEXT_PLANE_API_KEY: ${CONTEXT_PLANE_API_KEY:-dev-context-plane-key}
      USE_TOOL_RUNTIME_REMOTE: ${USE_TOOL_RUNTIME_REMOTE:-true}
      TOOL_RUNTIME_BASE_URL: ${TOOL_RUNTIME_BASE_URL:-http://tool-runtime:8093}
      TOOL_RUNTIME_API_KEY: ${TOOL_RUNTIME_API_KEY:-dev-tool-runtime-key}
      USE_POLICY_VALIDATOR_REMOTE: ${USE_POLICY_VALIDATOR_REMOTE:-true}
      POLICY_VALIDATOR_BASE_URL: ${POLICY_VALIDATOR_BASE_URL:-http://policy-validator:8095}
      POLICY_VALIDATOR_API_KEY: ${POLICY_VALIDATOR_API_KEY:-dev-policy-validator-key}
      USE_ARTIFACT_WRITER_REMOTE: ${USE_ARTIFACT_WRITER_REMOTE:-true}
      ARTIFACT_WRITER_BASE_URL: ${ARTIFACT_WRITER_BASE_URL:-http://artifact-writer:8096}
      ARTIFACT_WRITER_API_KEY: ${ARTIFACT_WRITER_API_KEY:-dev-artifact-writer-key}
      USE_EXPERT_SERVING_REMOTE: ${USE_EXPERT_SERVING_REMOTE:-false}
      EXPERT_SERVING_BASE_URL: ${EXPERT_SERVING_BASE_URL:-http://expert-serving:8094}
      EXPERT_SERVING_API_KEY: ${EXPERT_SERVING_API_KEY:-dev-expert-serving-key}
      EXPERT_SERVING_FAILURE_MODE: ${EXPERT_SERVING_FAILURE_MODE:-fallback_default}
      EXPERT_SERVING_LATENCY_BUDGET_MS: ${EXPERT_SERVING_LATENCY_BUDGET_MS:-30000}  # Danish 4.9 tok/s; raised from 1000 (2026-03-20)
      EXPERT_SERVING_DEFAULT_ACTION: ${EXPERT_SERVING_DEFAULT_ACTION:-request_context}
    depends_on:
      - kafka
      - context-plane
      - tool-runtime
      - policy-validator
      - artifact-writer
      - expert-serving
    ports:
      - "8090:8090"
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import sys, urllib.request; sys.exit(0 if urllib.request.urlopen('http://localhost:8090/health', timeout=2).getcode() == 200 else 1)",
        ]
      interval: 10s
      timeout: 3s
      retries: 6
      start_period: 10s

  aesa-redrive:
    build:
      context: .
      dockerfile: docker/Dockerfile.aesa-redrive
    environment:
      PYTHONUTF8: "1"
      PYTHONDONTWRITEBYTECODE: "1"
      AESA_KAFKA_BOOTSTRAP: ${AESA_KAFKA_BOOTSTRAP:-kafka:9092}
      AESA_KAFKA_DLQ_TOPIC: ${AESA_KAFKA_DLQ_TOPIC:-aesa.events.v1.dlq}
      AESA_KAFKA_RETRY_TOPIC: ${AESA_KAFKA_RETRY_TOPIC:-aesa.events.v1.retry}
      AESA_KAFKA_EXHAUSTED_TOPIC: ${AESA_KAFKA_EXHAUSTED_TOPIC:-aesa.events.v1.dlq.exhausted}
      AESA_KAFKA_REDRIVE_GROUP: ${AESA_KAFKA_REDRIVE_GROUP:-aesa-redrive}
      AESA_KAFKA_REDRIVE_MAX_ATTEMPTS: ${AESA_KAFKA_REDRIVE_MAX_ATTEMPTS:-3}
      AESA_KAFKA_REDRIVE_POLL_TIMEOUT: ${AESA_KAFKA_REDRIVE_POLL_TIMEOUT:-1.0}
      AESA_KAFKA_REDRIVE_IDLE_SLEEP: ${AESA_KAFKA_REDRIVE_IDLE_SLEEP:-0.2}
      AESA_KAFKA_REDRIVE_METRICS_PORT: ${AESA_KAFKA_REDRIVE_METRICS_PORT:-9101}
    depends_on:
      - kafka
    ports:
      - "9101:9101"

  aesa-retry-replay:
    build:
      context: .
      dockerfile: docker/Dockerfile.aesa-retry-replay
    environment:
      PYTHONUTF8: "1"
      PYTHONDONTWRITEBYTECODE: "1"
      AESA_KAFKA_BOOTSTRAP: ${AESA_KAFKA_BOOTSTRAP:-kafka:9092}
      AESA_KAFKA_TOPIC: ${AESA_KAFKA_TOPIC:-aesa.events.v1}
      AESA_KAFKA_RETRY_TOPIC: ${AESA_KAFKA_RETRY_TOPIC:-aesa.events.v1.retry}
      AESA_KAFKA_EXHAUSTED_TOPIC: ${AESA_KAFKA_EXHAUSTED_TOPIC:-aesa.events.v1.dlq.exhausted}
      AESA_KAFKA_REPLAY_GROUP: ${AESA_KAFKA_REPLAY_GROUP:-aesa-retry-replay}
      AESA_KAFKA_REPLAY_POLL_TIMEOUT: ${AESA_KAFKA_REPLAY_POLL_TIMEOUT:-1.0}
      AESA_KAFKA_REPLAY_IDLE_SLEEP: ${AESA_KAFKA_REPLAY_IDLE_SLEEP:-0.2}
      AESA_KAFKA_REPLAY_METRICS_PORT: ${AESA_KAFKA_REPLAY_METRICS_PORT:-9102}
    depends_on:
      - kafka
    ports:
      - "9102:9102"

  kafka:
    image: apache/kafka:3.9.0
    environment:
      KAFKA_NODE_ID: "1"
      KAFKA_PROCESS_ROLES: "broker,controller"
      KAFKA_CONTROLLER_QUORUM_VOTERS: "1@kafka:9093"
      KAFKA_LISTENERS: "PLAINTEXT://:9092,PLAINTEXT_HOST://:29092,CONTROLLER://:9093"
      KAFKA_ADVERTISED_LISTENERS: "PLAINTEXT://kafka:9092,PLAINTEXT_HOST://localhost:29092"
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: "CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT"
      KAFKA_CONTROLLER_LISTENER_NAMES: "CONTROLLER"
      KAFKA_INTER_BROKER_LISTENER_NAME: "PLAINTEXT"
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: "1"
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: "1"
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: "1"
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: "0"
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      CLUSTER_ID: "MkU3OEVBNTcwNTJENDM2Qk"
    ports:
      - "9092:9092"
      - "29092:29092"
    restart: unless-stopped
