# docker-compose.exercise.yml — Exercise Mode override
#
# Usage:
#   # dry_run (default — safe, no external writes):
#   EXERCISE_SCENARIO=content_workflow docker compose \
#     -f docker-compose.yml -f docker-compose.exercise.yml \
#     run --rm exercise-runner
#
#   # sandbox (isolated exercise.* topic namespace):
#   EXERCISE_MODE=sandbox EXERCISE_SCENARIO=crypto_intel_flow docker compose \
#     -f docker-compose.yml -f docker-compose.exercise.yml \
#     run --rm exercise-runner
#
#   # live (requires BOTH confirm token AND allow_external):
#   EXERCISE_MODE=live \
#   EXERCISE_CONFIRM=I_UNDERSTAND_THIS_IS_LIVE \
#   EXERCISE_ALLOW_EXTERNAL_WRITES=true \
#   EXERCISE_SCENARIO=content_workflow docker compose \
#     -f docker-compose.yml -f docker-compose.exercise.yml \
#     run --rm exercise-runner
#
#   # list available scenarios:
#   EXERCISE_SCENARIO=list docker compose \
#     -f docker-compose.yml -f docker-compose.exercise.yml \
#     run --rm exercise-runner
#
# This file does NOT modify any existing services.
# Exercise runner attaches to the existing llm-shared network as a read/write
# Kafka client only. No shared volumes with core services.

services:
  exercise-runner:
    build:
      context: .
      dockerfile: services/exercise_runner/Dockerfile
    container_name: babyai-exercise-runner
    networks:
      - llm-shared
    environment:
      # ── Required ──────────────────────────────────────────────────────────
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092

      # ── Scenario selection ────────────────────────────────────────────────
      EXERCISE_SCENARIO:  ${EXERCISE_SCENARIO:-content_workflow}

      # ── Execution mode ────────────────────────────────────────────────────
      # dry_run  : DRY_RUN=true; no external writes; synthetic results
      # sandbox  : topics prefixed exercise.*; real services run but isolated
      # live     : full production path; requires BOTH confirm + allow_external
      EXERCISE_MODE:      ${EXERCISE_MODE:-dry_run}
      DRY_RUN:            ${DRY_RUN:-true}

      # ── Live mode gates (both required for live) ──────────────────────────
      EXERCISE_CONFIRM:               ${EXERCISE_CONFIRM:-}
      EXERCISE_ALLOW_EXTERNAL_WRITES: ${EXERCISE_ALLOW_EXTERNAL_WRITES:-false}

      # ── Logging ───────────────────────────────────────────────────────────
      BABYAI_LOG_DIR: /app/logs

    volumes:
      # Trace output only — no write access to artifacts or core logs
      - ./logs/exercise:/app/logs/exercise

    depends_on:
      - kafka

    profiles:
      - exercise

    # Run once and exit — not a long-running service
    restart: "no"

# No new networks or volumes — reuse existing llm-shared network defined
# in docker-compose.yml.
