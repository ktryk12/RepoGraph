[tool:pytest]
# Pytest configuration for BabyAI microservices tests

# Test discovery
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Markers for different test types
markers =
    unit: Unit tests (fast, isolated, mocked dependencies)
    integration: Integration tests (cross-service communication)
    e2e: End-to-end tests (full user workflows)
    performance: Performance and load tests
    kafka: Tests involving Kafka messaging
    api: Tests involving HTTP APIs
    slow: Tests that take more than 5 seconds

# Test output
addopts =
    -v
    --tb=short
    --strict-markers
    --strict-config
    --color=yes
    --durations=10

# Async test support
asyncio_mode = auto

# Timeout settings (if using pytest-timeout)
timeout = 300
timeout_method = thread

# Warnings
filterwarnings =
    ignore::DeprecationWarning
    ignore::PendingDeprecationWarning

# Logging
log_cli = true
log_cli_level = INFO
log_cli_format = %(asctime)s [%(levelname)8s] %(name)s: %(message)s
log_cli_date_format = %Y-%m-%d %H:%M:%S

# Test environment
env =
    ENVIRONMENT=test
    LOG_LEVEL=DEBUG
    KAFKA_BOOTSTRAP_SERVERS=localhost:29092