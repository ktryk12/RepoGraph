# Service Manifest for context-plane
# ADR-0015: True Kafka-First Microservices - Phase 2: Database-per-Service

manifest_version: "1.0.0"
service_name: "context-plane"
last_updated: "2026-04-27"

# Service Identity
metadata:
  description: "Context retrieval and indexing service for code and documentation"
  owner_team: "babyai-core"
  repository: "https://github.com/babyai/babyai"
  service_tier: "tier_1"  # Critical path service

# Bounded Context Definition
bounded_context:
  name: "context-platform"
  description: "Manages context retrieval, code indexing, and document search"
  domain: "context"

  # Clear boundaries - what this service owns
  responsibilities:
    - "Code repository indexing and search"
    - "Context document storage and retrieval"
    - "Semantic search and similarity matching"
    - "Context payload caching and optimization"
    - "Document dependency graph management"
    - "Context query optimization and ranking"

  # What this service does NOT own
  boundaries:
    - "AI model inference (expert-serving responsibility)"
    - "Decision making workflows (orchestrator-worker responsibility)"
    - "File storage and artifacts (artifact-writer responsibility)"
    - "User authentication (authentication service responsibility)"

# Infrastructure Dependencies
infrastructure:
  database:
    type: "postgresql"
    schema: "context_plane"
    migrations_path: "alembic/"
    private_state: true

    # Migration from data-platform
    migration_source: "services/data-platform/src/storage/context_plane/index.db"
    migration_target: "postgresql://context_plane_db"

  messaging:
    kafka_contract: "kafka_contract.yaml"
    primary_consumer_group: "context-plane-workers"

  external_dependencies:
    - service: "expert-serving"
      interaction: "kafka_events"
      topics: ["evaluation.inference.requested.v1", "evaluation.inference.completed.v1"]
      description: "Context ranking and semantic search"

# Runtime Configuration
runtime:
  language: "python"
  framework: "fastapi"
  health_check: "/health"
  metrics_endpoint: "/metrics"

  deployment:
    min_replicas: 2
    max_replicas: 8
    cpu_request: "1000m"
    memory_request: "2Gi"

  environment_variables:
    required:
      - "DATABASE_URL"
      - "KAFKA_BOOTSTRAP_SERVERS"
      - "REPO_ROOT_PATH"
    optional:
      - "MAX_CONTEXT_TOKENS"
      - "INDEX_BATCH_SIZE"
      - "SEARCH_TIMEOUT_SECONDS"

# API Contracts
apis:
  public:
    - type: "kafka_events"
      contract: "kafka_contract.yaml"
      description: "Primary interface for context operations"

    - type: "rest_api"
      path: "/api/v1"
      description: "HTTP API for direct context retrieval"
      endpoints:
        - "POST /retrieve"
        - "POST /ingest"
        - "GET /health"

  private:
    - type: "health_check"
      path: "/health"
      description: "Service health endpoint"

    - type: "metrics"
      path: "/metrics"
      description: "Prometheus metrics endpoint"

# Data Ownership
data:
  owned_entities:
    - "context_entries"
    - "context_payloads"
    - "dep_graph"
    - "context_cache"
    - "search_indexes"

  migrated_from:
    - source: "services/data-platform/src/storage/context_plane/index.db"
      target: "postgresql context_plane schema"
      migration_strategy: "sqlite_to_postgresql_migration"
      migration_status: "phase_2_in_progress"

  shared_readonly:
    - "repository_files"  # Read from repository filesystem
    - "user_permissions"  # Read from authentication service

# Quality Attributes
quality:
  performance:
    target_latency_p95: "500ms"  # Context retrieval
    target_throughput: "500 requests/minute"
    index_update_latency: "30s"  # Repository indexing

  reliability:
    target_availability: "99.9%"
    max_data_loss: "0%"
    consistency: "eventual"  # Search indexes eventually consistent

  scalability:
    horizontal_scaling: true
    stateless_design: false  # Maintains search indexes
    read_replicas: "supported"

# Compliance and Security
compliance:
  adr_0015_status: "phase_2_database_migration"

  checklist:
    bounded_context: "✅ Context platform boundaries defined"
    database_per_service: "⏳ Migrating from data-platform SQLite to PostgreSQL"
    kafka_communication: "⏳ Event contracts being updated"
    service_manifest: "✅ This file"
    no_shared_state: "⏳ Migrating database ownership from data-platform"
    explicit_contracts: "⏳ kafka_contract.yaml in progress"

  security:
    authentication: "kafka_ssl"
    authorization: "kafka_acl"
    data_encryption: "postgresql_ssl"

# Development and Operations
development:
  build_tool: "docker"
  test_framework: "pytest"
  test_coverage_target: "85%"

  ci_cd:
    pipeline: ".github/workflows/context-plane.yml"
    deployment_strategy: "rolling_update"

  monitoring:
    logs: "structured_json"
    metrics: "prometheus"
    tracing: "jaeger"
    alerting: "pagerduty"

# Migration Status
migration:
  current_phase: "phase_2_database_ownership_transfer"
  migration_priority: "high"

  completed:
    - "PostgreSQL schema designed and implemented"
    - "Alembic migrations created"
    - "Service boundaries defined"

  in_progress:
    - "Database ownership transfer from data-platform"
    - "SQLite to PostgreSQL data migration"
    - "Kafka contract updates"
    - "Event-driven index updates"

  planned:
    - "Remove data-platform context database access"
    - "Implement context update events"
    - "Performance optimization for large repositories"
    - "Read replica configuration"

# Performance Characteristics
performance:
  database:
    connection_pool_size: 20
    max_connections: 100
    query_timeout_seconds: 30

  indexing:
    batch_size: 1000
    concurrent_workers: 4
    memory_limit_mb: 1024

  search:
    cache_size_mb: 512
    max_results: 1000
    timeout_seconds: 10

# Documentation
documentation:
  architecture: "docs/services/context-plane/README.md"
  api_docs: "docs/services/context-plane/api.md"
  migration_guide: "docs/services/context-plane/migration.md"
  performance_tuning: "docs/services/context-plane/performance.md"