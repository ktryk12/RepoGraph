schema_version: 1
version: v1
effective_from: "2026-04-18T00:00:00Z"
updated_at: "2026-04-18T00:00:00Z"
domain: skills
description: >
  Politik for skill-execution via skill-runtime service (port 8150).
  Styrer hvilke skills der må køre, rate-limits, timeout og ECB-gating.
  Alle executions er underlagt audit-first: telemetri emitteres FØR svar returneres.

# ── ECB-gating ────────────────────────────────────────────────────────────────
ecb_gating:
  enabled: true
  require_auth_header: X-BabyAI-Token
  public_endpoints:
    - GET /health
    - GET /skills
  protected_endpoints:
    - POST /skills/{id}/execute
    - POST /skills/{id}/feedback
    - GET /metrics
  description: >
    POST /skills/{id}/execute kræver gyldig X-BabyAI-Token.
    Offentlige endpoints (health, skill-liste) er åbne.

# ── Rate-limits ───────────────────────────────────────────────────────────────
rate_limits:
  default_per_minute: 30
  burst_per_second: 5
  per_skill_override:
    retro: 2           # Nightly cron; misbrug giver ingen mening
    cso: 10
    autoplan: 20
  description: >
    30 executions/min per bruger. Burst: 5/s.
    Skill-specifikke overrides kan nedsætte grænsen.

# ── Timeouts ──────────────────────────────────────────────────────────────────
timeouts:
  default_seconds: 60
  per_model_override:
    code-codestral: 90
    vision: 120
  max_context_tokens: 8000
  description: >
    Default 60s timeout per execution. Vision og code-codestral får ekstra tid.
    Context-pack overstigende 8000 tokens truncates til nyeste 6000.

# ── Audit-first ───────────────────────────────────────────────────────────────
audit:
  emit_before_response: true
  kafka_topic: skill.execution.completed
  required_fields:
    - skill_id
    - model
    - latency_ms
    - user_accepted
  include_input_hash: true
  include_output_hash: true
  description: >
    Telemetri emitteres til Kafka FØR response returneres til klient.
    Ingen execution uden audit-event. Input/output gemmes som SHA256-hash (ikke plaintext).

# ── Skill-tilladelser ─────────────────────────────────────────────────────────
skill_permissions:
  allow_filesystem_write: false
  allow_direct_db_write: false
  allow_subprocess: false
  allow_external_http: false
  artifact_writer_only: true
  description: >
    Skills må KUN skrive via artifact-writer. Ingen direkte filskrivning,
    DB-skrivning, subprocess eller external HTTP fra skill-body.
    Violations flagges og execution afbrydes.

# ── Model-routing validering ──────────────────────────────────────────────────
model_routing:
  allowed_models:
    - code-codestral
    - general
    - danish
    - vision
  fallback_model: general
  never_call_anthropic_api_directly: true
  description: >
    Skills routes til lokale modeller. Anthropic API må ALDRIG kaldes direkte
    fra skill-runtime. Fallback til 'general' hvis angivet model er utilgængelig.
