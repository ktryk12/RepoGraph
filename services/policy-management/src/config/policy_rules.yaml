version: 1

weights:
  pci_isolation: 0.90
  small_team_fast_mvp: 0.80
  low_operability: 0.70
  high_operability: 0.70
  high_throughput: 0.50
  strict_rto_rpo: 0.60
  gdpr_audit: 0.60
  mtls_security: 0.60

gates:
  microservices_requires_observability_level: ["standard", "advanced"]

limits:
  ops_readiness_services_threshold: 3
  ops_readiness_required_signals_by_services:
    - { max_services: 2, required: 0 }
    - { max_services: 5, required: 3 }
    - { max_services: 999, required: 4 }
  ops_readiness_min_signals: 3

penalties:
  forbidden_violation_multiplier: 0.0
  microservices_without_observability_multiplier: 0.2
  microservices_ops_readiness_multiplier: 0.0
  service_sprawl_soft_multiplier: 0.95

  must_include_missing_per_item: 0.15
  must_include_missing_cap: 0.8

  # NEW: security explainability / thresholds
  security_low_threshold: 0.85
  security_penalty_include_missing_signals: true
  security_baseline_no_scope: 1.0
  microservices_min_security_multiplier: 0.80
