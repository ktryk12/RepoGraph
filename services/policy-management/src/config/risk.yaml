schema_version: 1
version: v1
effective_from: "2026-04-18T00:00:00Z"
updated_at: "2026-04-18T00:00:00Z"
domain: trading
description: >
  Risiko-politik for broker-gateway og risk-engine.
  Udvider policy/trading_policy.py med BYOK live-trading-regler.
  Hard-regler blokerer ordre; soft-regler logges som warnings.
  PAPER_ONLY=true er default og kan kun ophæves med eksplicit
  human_approval + validate_live_switch()-godkendelse.

# ── Live-switch guard ─────────────────────────────────────────────────────────
live_trading:
  paper_only_default: true
  require_human_approval_env: TRADING_LIVE_APPROVED
  require_paper_weeks_min: 2
  require_paper_trades_min: 50
  require_paper_win_rate_min: 0.50
  description: >
    Live-handel kræver: (1) TRADING_LIVE_APPROVED=true sat af menneske,
    (2) minimum 2 ugers papir-handel, (3) ≥50 papir-trades, (4) win-rate ≥50%.

# ── Per-ordre hard-grænser ────────────────────────────────────────────────────
order_limits:
  max_order_usdt: 50
  max_order_btc_equivalent: 0.001
  max_notional_eur: 10000
  description: >
    Hård grænse per enkelt ordre. Overskridelse → ordre afvises
    inden submission til broker.

# ── Portefølje-eksponeringslofter ─────────────────────────────────────────────
exposure_limits:
  max_total_exposure_usdt: 500
  max_position_pct_of_equity: 0.05
  max_total_exposure_pct_of_equity: 0.30
  max_concurrent_positions: 5
  max_positions_same_asset_class: 3

# ── Signal-kvalitetskrav ──────────────────────────────────────────────────────
signal_quality:
  min_confidence: 0.65
  min_volume_24h_usdt: 10_000_000
  description: >
    Signaler under min_confidence afvises. Symboler med under
    10M USDT 24h-volumen er blacklistet (illikviditet).

# ── Daglige handelslofter ─────────────────────────────────────────────────────
daily_limits:
  max_trades_per_day: 10
  max_daily_loss_pct: 3.0
  description: >
    Max 10 trades per dag. Hvis dagens tab overstiger 3% af
    equity → trading pauses til næste dag + alert sendes.

# ── Drawdown circuit-breakers ─────────────────────────────────────────────────
circuit_breakers:
  max_drawdown_pct: 10.0
  consecutive_loss_trades_pause: 3
  pause_duration_hours: 24
  description: >
    10% drawdown fra all-time-high → global trading halt, kræver
    manuel genaktivering. 3 tab i træk → 24 timers pause.

# ── Blacklist ─────────────────────────────────────────────────────────────────
blacklisted_symbols:
  - LUNA
  - UST
  - FTT
blacklist_description: >
  Hardkodet blacklist. Tilføj symbols der har vist systemisk risiko.
  Må kun ændres via pull request + human approval.
blacklist_allow_override: false

# ── Leverage ──────────────────────────────────────────────────────────────────
leverage:
  max_leverage: 1
  futures_allowed: false
  description: >
    Leverage > 1x og futures er forbudt i alle faser.
    Kun spot-handel tilladt.

# ── Audit-krav ────────────────────────────────────────────────────────────────
audit:
  log_all_decisions: true
  write_to_artifact_writer: true
  include_rejected_orders: true
  description: >
    Alle ordre-beslutninger (inkl. afvisninger) skrives til artifact-writer
    før eksekvering (audit-first). Ingen exception.

# ── BYOK-kunde-isolation ──────────────────────────────────────────────────────
byok_isolation:
  keys_encrypted_at_rest: true
  keys_never_logged: true
  per_customer_whitelist_required: true
  api_key_scope: spot_only
  description: >
    Kunders API-nøgler krypteres at-rest (Vault/KMS).
    Aldrig i plaintext i log, database eller environment-dump.
    Per-kunde: kun whitelistede trading-pairs tilladt.

# ── Soft rules (warnings, blokerer ikke) ─────────────────────────────────────
soft_rules:
  prefer_limit_orders:
    enabled: true
    description: Market-ordrer frarådes — brug limit for at reducere slippage.
  diversification_warning:
    enabled: true
    asset_class_threshold: 3
    description: >
      Advarsel hvis ≥3 positioner i samme asset-class åbnes simultant.
  low_liquidity_warning:
    enabled: true
    volume_threshold_usdt: 50_000_000
    description: >
      Advarsel ved symboler med volumen 10–50M USDT/24h (lovligt men risikabelt).

# ── Prisgrænser og kreditering ────────────────────────────────────────────────
billing_tiers:
  watcher:
    signals_only: true
    auto_execute: false
    max_strategies: 0
  autopilot:
    signals_only: false
    auto_execute: true
    max_strategies: 3
    max_total_exposure_usdt_override: 500
  pro:
    signals_only: false
    auto_execute: true
    max_strategies: 999
    max_total_exposure_usdt_override: 5000
    custom_risk_allowed: true
    description: >
      Pro-tier kan justere risk-parametre inden for policy-loftet
      (max_position_pct max 0.10, max_total_exposure max 0.50).
      Kan IKKE ophæve hard-regler.
