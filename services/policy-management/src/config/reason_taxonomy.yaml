version: 1
namespaces:
  ARCH:
    description: Architecture-related reason codes.
  SEC:
    description: Security-related reason codes.
  DATA:
    description: Data-related reason codes.
  RIGHTS:
    description: Rights-related reason codes.
  OPS:
    description: Ops-readiness reason codes.
  RAG:
    description: Retrieval reason codes.
  POLICY:
    description: Policy-related reason codes.
  DETREVIEW:
    description: "Deterministic review reason codes."
    codes:
      - DETREVIEW.schema_invalid
      - DETREVIEW.evidence_missing
      - DETREVIEW.missing_contract_tests
      - DETREVIEW.missing_sast_pass
      - DETREVIEW.missing_threat_model
      - DETREVIEW.missing_audit_completeness_tests
      - DETREVIEW.missing_audit_log
      - DETREVIEW.missing_evidence
      - DETREVIEW.ops_missing_runbook
  PROMOTION:
    description: "Promotion gate reason codes."
codes:
  DETREVIEW_PASS:
    severity: info
    description: "Deterministic review succeeded without findings."
  DETREVIEW_MANIFEST_WRITE_BYPASS:
    severity: error
    description: "Write detected directly touching artifacts/registry manifest outside the approved writer."
  DETREVIEW_HOMEBREW_HASH:
    severity: error
    description: "Homegrown hashing or serialization found in guarded writer paths."
  DETREVIEW_MISSING_CONTRACT_FIELDS:
    severity: error
    description: "Required contract fields (kind/schema_version) were missing."
  DETREVIEW_GATE_DENIED:
    severity: error
    description: "Writer gate (killswitch) denied the artifact write."
  DETREVIEW_UNKNOWN_REASON_CODE:
    severity: error
    description: "Unknown reason code encountered when compiling the review report."
  PROMOTION_ALLOWED_STABLE:
    severity: info
    description: "Stable promotion allowed (zero errors)."
  PROMOTION_ALLOWED_CANARY:
    severity: info
    description: "Canary promotion allowed under policy."
  PROMOTION_DENIED_STABLE_ERRORS_PRESENT:
    severity: error
    description: "Stable promotion denied because error count exceeded zero."
  PROMOTION_DENIED_CANARY_POLICY_VIOLATION:
    severity: error
    description: "Canary promotion denied because canary_level was not >0."
  PROMOTION_DENIED_CANARY_TOO_MANY_ERRORS:
    severity: error
    description: "Canary promotion denied because error count exceeded policy limit."
  PROMOTION_DENIED_CANARY_ERRORS_NOT_ALLOWLISTED:
    severity: error
    description: "Canary promotion denied because errors were not in allowlist."
  PROMOTION_DENIED_SUMMARY_MISSING:
    severity: error
    description: "JudgeSummary artifact missing for promotion gate."
  PROMOTION_DENIED_SUMMARY_INVALID:
    severity: error
    description: "JudgeSummary artifact invalid or failed schema validation."

  schema_invalid:
    severity: error
    description: "Decision missing or invalid required schema fields."
  evidence_missing:
    severity: error
    description: "Required evidence documents are absent."
  missing_contract_tests:
    severity: error
    description: "Contract tests referenced in policy are missing."
  missing_sast_pass:
    severity: error
    description: "Static analysis or SAST artifact is missing."
  missing_threat_model:
    severity: error
    description: "Threat model artifacts are missing."
  missing_audit_completeness_tests:
    severity: error
    description: "Audit completeness tests are not present."
  missing_audit_log:
    severity: error
    description: "Audit logs are missing or incomplete."
  missing_evidence:
    severity: error
    description: "Evidence for the claimed decision is missing."
  ops_missing_runbook:
    severity: error
    description: "Ops runbook or playbook artifacts are absent."

legacy_aliases:
  schema_invalid: DETREVIEW.schema_invalid
  evidence_missing: DETREVIEW.evidence_missing
  missing_contract_tests: DETREVIEW.missing_contract_tests
  missing_sast_pass: DETREVIEW.missing_sast_pass
  missing_threat_model: DETREVIEW.missing_threat_model
  missing_audit_completeness_tests: DETREVIEW.missing_audit_completeness_tests
  missing_audit_log: DETREVIEW.missing_audit_log
  missing_evidence: DETREVIEW.missing_evidence
  ops_missing_runbook: DETREVIEW.ops_missing_runbook

dynamic_patterns:
  - "^[a-z][a-z0-9_]*$"
  - "^[a-z][a-z0-9_]*:[a-z0-9_]+$"
  - "^[A-Z][A-Z0-9_]*$"
