schema_version: 1
version: v1-draft
status: DRAFT                          # DRAFT → pending user review → ACTIVE
effective_from: null                   # sættes ved user-godkendelse (Sprint 1→2 gate)
updated_at: "2026-04-19T00:00:00Z"
domain: learning
description: >
  Copyright-politik for BABYAI_CODEBASE_LEARNING_PROGRAM_V2.
  Styrer hvilke data-kilder der må bruges direkte som træningstekst,
  hvilke kun er tilladt via transformativ brug (teacher-output),
  og hvilke der er forbudt.
  STATUS: DRAFT — BLOKERER IKKE data-ingestion endnu.
  Skal godkendes af bruger ved Sprint 1→2 gate inden aktivering.

# ── VIGTIGT: aktiverings-gate ────────────────────────────────────────────────
activation:
  requires_user_approval: true
  approval_topic: decision.approval
  approval_required_before: sprint_2_start
  current_status: DRAFT
  note: >
    Denne fil ublokerer check 12 (copyright_policy_loaded) i precondition-check.
    Data-ingestion STARTES IKKE før status er ACTIVE og bruger har godkendt.

# ── Strategi: Conservative (A) ───────────────────────────────────────────────
strategy: conservative_a
strategy_description: >
  Kun data vi ejer eller der er utvetydigt public domain bruges direkte.
  Al scraped tredjeparts-indhold behandles via transformativ teacher-pipeline.
  Output af vores egne teachers er vores — ikke originalteksten.

# ── Godkendte kilder: direkte træningstekst ──────────────────────────────────
allowed_direct:
  - id: own_babyai_code
    type: kode
    source_pattern: "e:/repos/babyAI/**/*.py"
    license: own
    begrundelse: Ejet af os

  - id: own_newmodel_code
    type: kode
    source_pattern: "e:/repos/NewModel/**/*.py"
    license: own
    begrundelse: Ejet af os

  - id: own_docs_readme
    type: tekst
    source_pattern: "**/*.md"
    license: own
    begrundelse: Eget dokumentation

  - id: own_skill_execution_events
    type: struktureret
    source: "kafka:skill.execution.completed"
    license: own
    begrundelse: Produceret af vores system

  - id: own_fact_check_verdicts
    type: tekst
    source: "artifacts/fact_check/**"
    license: own
    begrundelse: Produceret af vores system

  - id: own_editorial_decisions
    type: tekst
    source: "artifacts/editorial/**"
    license: own
    begrundelse: Produceret af vores system

  - id: own_legal_review_outputs
    type: tekst
    source: "artifacts/legal_review/**"
    license: own
    begrundelse: Produceret af vores system

  - id: own_provenance_decisions
    type: struktureret
    source: "artifacts/provenance/**"
    license: own
    begrundelse: Produceret af vores system

  - id: own_crypto_analyses_openbb
    type: tekst
    source: "artifacts/trading/**"
    license: own
    begrundelse: Vi analyserer, output er vores — ikke rådata fra OpenBB

  - id: sec_filings
    type: tekst
    source: "https://www.sec.gov/cgi-bin/browse-edgar"
    license: public_domain
    begrundelse: US government public domain
    caveat: Verificér at der ikke er tredjeparts-analyser embedded

  - id: ecb_statements
    type: tekst
    source: "https://www.ecb.europa.eu"
    license: public
    begrundelse: Public (tjek EU-specifik licens ved brug)
    caveat: >
      ECB bruger CC BY 4.0 for de fleste dokumenter.
      Verificér per dokument-type inden inkludering.
      ESKALÉR til copyright_decision_needed ved tvivl.

  - id: government_data_feeds
    type: data
    source: diverse
    license: public_domain
    begrundelse: Typisk public domain
    caveat: Verificér per kilde — Danmarks Statistik, Eurostat osv.

# ── Transformativ brug: teacher-output tilladt, ikke originalteksten ──────────
allowed_transformative:
  description: >
    Scraped/tredjeparts data bruges KUN som INPUT til vores Qwen-teachers.
    Det er teacher-output der gemmes i datasættet — ikke originalteksten.
    Hvert syntetisk sample SKAL tagge derived_from + derivation_method.

  sources_allowed_as_teacher_input:
    - id: firecrawl_news
      type: scraped_news
      note: >
        Reuters, Bloomberg, danske medier, RSS-feeds.
        MÅ IKKE gemmes direkte. Bruges som teacher-prompt-kontekst.

    - id: rss_feeds
      type: rss
      note: >
        Licens typisk uklar. Kun transformativ brug.
        Artikelindhold bruges som teacher-input — ikke som træningstekst.

    - id: github_third_party
      type: kode
      note: >
        GitHub-repos udenfor vores egne. License-check kræves.
        Kun MIT/Apache/public domain accepteres som teacher-input.
        GPL og proprietær: ESKALÉR til copyright_decision_needed.

  required_tags_on_synthetic_output:
    - derived_from                     # URL eller artifact-ref til kilden
    - derivation_method                # "qwen3-235b-analysis" | "teacher-summary" osv.
    - source_license_of_input          # licens på input-materialet
    - transformation_type              # "summary" | "analysis" | "translation" | "qa_pair"

  teachers:
    - model: qwen3-235b
      port: 5501
      license_check_pending: true      # Tjek Qwen3 licens for commercial redistribution
      note: Primær distillation-teacher

    - model: qwen35-35b
      port: 5502
      license_check_pending: true
      note: Kode + struktureret output

    - model: qwen3-30b-code
      port: 5503
      license_check_pending: true
      note: Code-specialist

    - model: mixtral-nous-hermes
      port: 8105
      license: apache-2.0
      license_check_pending: false
      note: Distillation — Apache 2.0 tillader commercial use

    - model: glm-5.1
      port: 8211
      license_check_pending: true
      note: General 753B MoE — verificér redistribution-vilkår

  qwen_license_escalation: >
    Qwen-teacher output til redistribution kræver verificering af
    Qwen3 model-licens (Tongyi Qianwen License). ESKALÉR til
    teacher_license_clarification før Sprint 4 (første rigtige træning).

# ── FORBUDT: direkte træningstekst ───────────────────────────────────────────
forbidden_direct:
  - id: scraped_news_direct
    examples: [Reuters, Bloomberg, DR, Politiken, Berlingske]
    reason: Copyright tilhører udgiveren

  - id: rss_content_direct
    reason: Licens uklar — default FORBUD

  - id: ml_ai_tutorials
    examples: [Hugging Face docs, PyTorch tutorials, arXiv fulltekst]
    reason: Tredjeparts ophavsret eller TOS mod ML-træning

  - id: stackoverflow_answers
    reason: CC BY-SA kræver share-alike — uforenelig med vores licensstrategi

  - id: github_third_party_direct
    reason: Kræver license-check; default FORBUD indtil verificeret

  - id: tos_against_ml
    examples: [Twitter/X, LinkedIn, OpenAI API outputs]
    reason: TOS eksplicit mod ML-træningsbrug

# ── Per-sentence provenance (obligatorisk) ───────────────────────────────────
provenance_schema:
  required_fields:
    - text
    - source_type              # own_code | own_artifact | public_domain | synthetic_derived
    - source_url
    - source_license           # MIT | Apache-2.0 | public | own | Qwen-derived | ...
    - fetched_at               # ISO-8601
    - lang                     # da | en | mixed
    - expert_tag               # general | code_devops | danish_general | ml_ai | systems | retrieval_memory | science | creative_other
    - expert_confidence        # 0.0-1.0
    - babyai_provenance_chain  # [artifact_id_1, artifact_id_2]
    - content_hash             # sha256:...
  reject_without_full_provenance: true

# ── Cross-lingual pairs ───────────────────────────────────────────────────────
cross_lingual_pairs:
  priority: highest
  description: >
    Dansk-engelsk par er unique selling point. Prioritér i dataset-balance.
  required_schema:
    - pair_type: cross_lingual
    - task                     # fx "english_filing_to_danish_compliance"
    - english_input
    - danish_output
    - both_lang_tag: true
    - expert_tag
    - secondary_expert         # valgfrit

# ── Eskalering ved grænsetilfælde ─────────────────────────────────────────────
escalation:
  gray_zone_action: pause_and_escalate
  escalation_topic: human.input_required
  categories:
    - copyright_decision_needed
    - teacher_license_clarification
    - gray_zone_source_decision
  timeout_default: pause             # aldrig auto-approve ved timeout
