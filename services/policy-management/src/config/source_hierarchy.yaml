schema_version: 1
version: v1
effective_from: "2026-04-18T00:00:00Z"
updated_at: "2026-04-18T00:00:00Z"
domain: fact_check
description: >
  Kildekvalitets-scoring brugt af source_validator_agent.
  Scores er 0.0–1.0. Minimum-kilde-score til at bidrage som
  primær evidens er 0.60.

minimum_primary_source_score: 0.60
minimum_sources_for_verdict: 2

tiers:

  tier_1_authoritative:
    score: 0.95
    description: Peer-reviewed forskning og officielle myndigheder
    examples:
      - PubMed / Cochrane Reviews
      - WHO, CDC, SSI, Sundhedsstyrelsen
      - Danmarks Statistik, Eurostat
      - ECB, Nationalbanken, Finanstilsynet
      - Domstolsafgørelser (retsinformation.dk)
      - Lovgivning (retsinformation.dk, EUR-Lex)

  tier_2_professional:
    score: 0.80
    description: Anerkendte professionelle medier og organisationer
    examples:
      - DR, TV2, Berlingske, Politiken, Jyllands-Posten
      - Reuters, AP, AFP, Bloomberg, Financial Times
      - Officielle virksomhedsregnskaber (SEC EDGAR, CVR)
      - Fagforeninger og brancheorganisationer (officielle udmeldinger)

  tier_3_journalistic:
    score: 0.60
    description: Journalistiske medier med redaktionel standard
    examples:
      - Regionale dagblade med redaktion
      - Specialiserede fagmedier (Finans, Ingeniøren)
      - Internationale medier med fact-check-desk

  tier_4_social_official:
    score: 0.40
    description: Officielle konti på sociale medier
    examples:
      - Verificerede konti (✓) fra myndigheder og virksomheder
      - Officielle pressemeddelelser fra organisations-accounts

  tier_5_social_general:
    score: 0.20
    description: Generelle sociale medier uden verifikation
    examples:
      - Ikke-verificerede Twitter/X-konti
      - Reddit, Facebook-grupper
      - Blogs uden redaktionel oversigt

  tier_0_blocked:
    score: 0.00
    description: Kendte desinformationskilder eller anonyme leaks
    examples:
      - Kendte propaganda-sites (blocklist.yaml)
      - Anonyme "insider"-leaks uden corroboration
      - Sites med gentagne fact-check-fejl (3+ misses)

rules:

  corroboration_required_for_strong_verdict:
    enabled: true
    description: >
      TRUE eller FALSE kræver minimum 2 tier_1/tier_2-kilder
      der er uafhængige af hinanden.
    min_independent_sources: 2
    min_tier_score: 0.80

  single_source_caps_at_misleading:
    enabled: true
    description: >
      Én kilde alene — uanset kvalitet — kan maksimalt give
      verdict MISLEADING, aldrig TRUE/FALSE.

  contradicting_tiers_yields_unverified:
    enabled: true
    description: >
      Hvis tier_1/tier_2 modsiger hinanden direkte, sættes
      verdict til UNVERIFIED med note om uenighed.
