schema_version: 1
version: v1
effective_from: "2026-04-18T00:00:00Z"
updated_at: "2026-04-18T00:00:00Z"
domain: fact_check
description: >
  Definerer hvornår legal_review_agent skal konsulteres obligatorisk
  som blokkerende gate (verdict må ikke emitttes uden legal clearance).
  Håndhæves af verdict_agent og production_router_agent.

mandatory_legal_review_triggers:

  named_living_person_verdict_false:
    enabled: true
    severity: 1.0
    description: >
      Enhver FALSE-verdict der navngiver en levende person kræver
      legal_review. Injurie-risiko er høj selv ved dokumenterede fakta.

  named_company_false:
    enabled: true
    severity: 0.95
    description: >
      FALSE-verdict mod navngiven virksomhed med mulig kurs-effekt
      (børsnoteret eller venture-backed) kræver legal_review.

  crypto_scam_allegation:
    enabled: true
    severity: 0.95
    description: >
      Claims der beskriver et konkret projekt som scam, rug pull
      eller fraud kræver legal_review. Diffamerings-risiko + potentielle
      markedspåvirkninger.

  political_election_claim:
    enabled: true
    severity: 0.90
    description: >
      Claims om valgresultater, stemmetal eller valgsvindel kræver
      legal_review grundet demokratisk følsomhed og potentiel valglovgivning.

  medical_treatment_claim:
    enabled: true
    severity: 0.90
    description: >
      Claims om at en given behandling er effektiv eller skadelig
      kræver legal_review (markedsføringsloven + sundhedslovgivning).

  religious_or_ethnic_group:
    enabled: true
    severity: 0.85
    description: >
      Claims der sætter en religiøs eller etnisk gruppe i forbindelse
      med kriminalitet eller undergravende adfærd kræver legal_review
      (racismeparagraf, diskriminationsforbud).

  whistleblower_source:
    enabled: true
    severity: 0.85
    description: >
      Claims der stammer fra en anonym whistleblower-kilde kræver
      legal_review for kildebekyttelseshensyn og verifikation-minimum.

legal_review_outcomes:
  CLEARED:
    description: Legal_review_agent godkendte. Publicering tilladt.
  CLEARED_WITH_DISCLAIMER:
    description: Godkendt med obligatorisk disclaimer-tekst i video.
    requires_disclaimer_text: true
  HOLD:
    description: >
      Kræver menneskelig advokat-vurdering inden publicering.
      Artefakt sendes til review-queue med tag 'legal-hold'.
  BLOCKED:
    description: >
      legal_review_agent vurderer publicering som ulovlig eller
      uacceptabel risiko. Claim arkiveres, publiceres ikke.

escalation:
  legal_hold_notify_channel: review_queue
  legal_hold_sla_hours: 48
  unresolved_after_sla: BLOCKED
