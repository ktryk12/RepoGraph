# Service Manifest for orchestrator-worker
# ADR-0015: True Kafka-First Microservices

manifest_version: "1.0.0"
service_name: "orchestrator-worker"
last_updated: "2026-04-27"

# Service Identity
metadata:
  description: "Core evaluation orchestration service coordinating decision workflows"
  owner_team: "babyai-core"
  repository: "https://github.com/babyai/babyai"
  service_tier: "tier_1"  # Critical path service

# Bounded Context Definition
bounded_context:
  name: "evaluation-orchestrator"
  description: "Orchestrates evaluation episodes from decision intake to completion"
  domain: "evaluation"

  # Clear boundaries - what this service owns
  responsibilities:
    - "Episode execution lifecycle management"
    - "Decision request processing and validation"
    - "Evaluation workflow orchestration"
    - "Policy approval enforcement"
    - "Idempotency and retry coordination"
    - "Cross-service event correlation"

  # What this service does NOT own
  boundaries:
    - "Context retrieval logic (context-plane responsibility)"
    - "AI model inference (expert-serving responsibility)"
    - "Tool execution (tool-runtime responsibility)"
    - "Artifact storage (artifact-writer responsibility)"
    - "Policy decision making (policy-validator responsibility)"

# Infrastructure Dependencies
infrastructure:
  database:
    type: "postgresql"
    schema: "orchestrator_worker"
    migrations_path: "migrations/"
    private_state: true

  messaging:
    kafka_contract: "kafka_contract.yaml"
    primary_consumer_group: "orchestrator-workers"

  external_dependencies:
    - service: "context-plane"
      interaction: "kafka_events"
      topics: ["evaluation.context.requested.v1", "evaluation.context.retrieved.v1"]

    - service: "expert-serving"
      interaction: "kafka_events"
      topics: ["evaluation.inference.requested.v1", "evaluation.inference.completed.v1"]

    - service: "tool-runtime"
      interaction: "kafka_events"
      topics: ["evaluation.tool.requested.v1", "evaluation.tool.completed.v1"]

    - service: "artifact-writer"
      interaction: "kafka_events"
      topics: ["artifact.write.requested.v1", "artifact.write.completed.v1"]

# Runtime Configuration
runtime:
  language: "python"
  framework: "asyncio"
  health_check: "/health"
  metrics_endpoint: "/metrics"

  deployment:
    min_replicas: 2
    max_replicas: 10
    cpu_request: "500m"
    memory_request: "1Gi"

  environment_variables:
    required:
      - "KAFKA_BOOTSTRAP_SERVERS"
      - "DATABASE_URL"
      - "POLICY_CONFIG_PATH"
    optional:
      - "MAX_EPISODE_RETRIES"
      - "APPROVAL_TIMEOUT_SECONDS"

# API Contracts
apis:
  public:
    - type: "kafka_consumer"
      contract: "kafka_contract.yaml"
      description: "Primary interface for decision processing"

  private:
    - type: "health_check"
      path: "/health"
      description: "Service health endpoint"

    - type: "metrics"
      path: "/metrics"
      description: "Prometheus metrics endpoint"

# Data Ownership
data:
  owned_entities:
    - "episode_state"
    - "decision_locks"
    - "orchestration_metadata"
    - "evaluation_results"

  shared_readonly:
    - "policy_rules"  # Read from policy services
    - "skill_definitions"  # Read from skill registry

  external_dependencies:
    - entity: "context_packs"
      owner: "context-plane"
      access_pattern: "kafka_request_response"

    - entity: "inference_results"
      owner: "expert-serving"
      access_pattern: "kafka_request_response"

# Quality Attributes
quality:
  performance:
    target_latency_p95: "5000ms"  # Decision to completion
    target_throughput: "100 decisions/minute"

  reliability:
    target_availability: "99.9%"
    max_message_loss: "0%"
    idempotency: "required"

  scalability:
    horizontal_scaling: true
    stateless_design: false  # Maintains episode state
    partition_tolerance: true

# Compliance and Security
compliance:
  adr_0015_status: "phase_1_in_progress"

  checklist:
    bounded_context: "✓ Defined evaluation orchestration boundaries"
    database_per_service: "✓ Private PostgreSQL schema"
    kafka_communication: "⏳ Migrating to v1 envelope topics"
    service_manifest: "✓ This file"
    no_shared_state: "✓ No shared databases or files"
    explicit_contracts: "⏳ kafka_contract.yaml created, schemas pending"

  security:
    authentication: "kafka_ssl"
    authorization: "kafka_acl"
    data_encryption: "kafka_ssl_at_rest"

# Development and Operations
development:
  build_tool: "docker"
  test_framework: "pytest"
  test_coverage_target: "85%"

  ci_cd:
    pipeline: ".github/workflows/orchestrator-worker.yml"
    deployment_strategy: "rolling_update"

  monitoring:
    logs: "structured_json"
    metrics: "prometheus"
    tracing: "jaeger"
    alerting: "pagerduty"

# Migration Status
migration:
  current_phase: "phase_1_kafka_foundation"

  completed:
    - "Service boundaries identified"
    - "Database schema isolated"
    - "Kafka contract defined"
    - "Service manifest created"

  in_progress:
    - "Topic schema creation"
    - "Envelope v1 adoption"
    - "Correlation ID implementation"
    - "Legacy topic migration"

  planned:
    - "Cross-service import elimination (Phase 3)"
    - "API gateway integration (Phase 4)"
    - "Distributed tracing (Phase 5)"

# Documentation
documentation:
  architecture: "docs/services/orchestrator-worker/README.md"
  api_docs: "docs/services/orchestrator-worker/api.md"
  runbook: "docs/services/orchestrator-worker/runbook.md"
  troubleshooting: "docs/services/orchestrator-worker/troubleshooting.md"