const modelCounts=useMemo(()=>({online:modelRows.filter(m=>m.status==="online").length,idle:modelRows.filter(m=>m.status==="idle").length,offline:modelRows.filter(m=>m.status==="offline").length}),[modelRows]);
const ring={background:`conic-gradient(var(--teal) ${healthPercent}%, rgba(165,173,210,.2) ${healthPercent}% 100%)`};
const Dashboard=()=> <><section className="card"><div className="ey">Good morning, Kim</div><div className="h1">BabyAI Command Center</div><div className="mut">Live governance dashboard with policy, episode and model operations.</div><div style={{marginTop:10,display:"flex",gap:8,flexWrap:"wrap"}}><a className="chip warn" href="/policy" style={{textDecoration:"none"}}><I n="shield" s={13}/>Policy Studio</a><a className="chip warn" href="/approvals" style={{textDecoration:"none"}}><I n="layers" s={13}/>Approvals</a></div></section><section className="card"><div className="row"><strong>System Health</strong><span className={chipClass(healthPercent>=80?"online":healthPercent>0?"pending":"offline")}>{healthPercent>=80?"Excellent":healthPercent>0?"Degraded":"Offline"}</span></div><div className="row" style={{marginTop:10,alignItems:"flex-start"}}><div className="ring" style={ring}><div className="rin">{healthPercent}%</div></div><div><div style={{fontWeight:700}}>5 phases active</div><div className="mut">{passRatePercent}% tests passing</div><div className="mut">{runs.length} episodes observed</div><div className="mut">{pendingApprovals.length} pending approvals</div><div className="mut">ops entries {toNum(opsDashboard&&opsDashboard.sources&&opsDashboard.sources.artifact_registry&&opsDashboard.sources.artifact_registry.entries_total,0)}</div></div></div><div className="bars" style={{marginTop:10}}>{runBars.map((h,i)=><span key={`b-${i}`} style={{height:`${h}%`}}/>)}</div></section><section className="grid3"><article className="card"><div className="row"><span className="mut">Active Policies</span><I n="shield" s={15}/></div><div className="h1" style={{fontSize:"1.35rem"}}>{policyRows.filter(r=>r.status==="active").length}</div><div className="mut">{policyRows.filter(r=>r.status==="pending").length} awaiting approval</div></article><article className="card"><div className="row"><span className="mut">Episodes Run</span><I n="activity" s={15}/></div><div className="h1" style={{fontSize:"1.35rem"}}>{runs.length}</div><div className="mut">Recent terminal outcomes from /api/runs</div></article><article className="card"><div className="row"><span className="mut">Pending Approvals</span><I n="bell" s={15}/></div><div className="h1" style={{fontSize:"1.35rem"}}>{pendingApprovals.length}</div><div className="mut">From /api/approvals/pending</div></article></section><section className="card"><div className="row"><strong>Recent Episodes</strong><span className="mut">latest 3</span></div>{dashLoading?<div className="empty" style={{marginTop:8}}>Loading runs...</div>:runs.length?<div className="list" style={{marginTop:8}}>{runs.slice(0,3).map(r=><article className="item" key={String(r.decision_id||r.task_id||Math.random())}><div className="row"><div><div className="mono">{String(r.decision_id||"unknown")}</div><div className="sub">{String(r.context_id||"n/a")} - {String(r.event_type||"event")}</div></div><span className={chipClass(r.passed===true?"completed":r.passed===false?"offline":"pending")}>{r.passed===true?"passed":r.passed===false?"failed":"pending"}</span></div></article>)}</div>:<div className="empty" style={{marginTop:8}}>No live episodes yet.</div>}</section><section className="card"><div className="row"><strong>Quick Actions</strong><span className="mut">live actions</span></div><div className="grid4" style={{marginTop:8}}><button className="btn pri" onClick={()=>setTab("episodes")}><I n="zap" s={14}/> New Episode</button><button className="btn pri" onClick={()=>setTab("policies")}><I n="shield" s={14}/> New Policy</button><button className="btn pri" onClick={refreshDashboard}><I n="activity" s={14}/> Refresh</button><button className="btn pri" onClick={()=>setTab("models")}><I n="cpu" s={14}/> Model Status</button></div></section><section className="card"><div className="row"><strong>Service Reachability</strong><span className="mut">from localhost:8080</span></div><div className="grid2" style={{marginTop:8}}>{services.map(s=><div className="item" key={s.id}><div className="row"><span className="sub">{s.name}</span><span className={chipClass(s.status)}>{s.status}</span></div><div className="sub">{s.detail}</div></div>)}</div>{dashError?<div className="empty" style={{marginTop:8}}>{dashError}</div>:null}</section></>;
const Policies=()=> <><section className="card"><div className="ey">Policies</div><div className="h1">Policy Library</div><div className="mut">Live sessions from policy-bootstrap. Domain, fingerprint and approval status are loaded from API.</div><div className="seg">{["active","pending","draft"].map(s=><button key={s} className={`segb ${policySegment===s?"a":""}`} onClick={()=>setPolicySegment(s)}>{s}</button>)}</div></section><section className="card"><div className="row"><strong>New Policy Session</strong><span className="mut">POST /policy/sessions</span></div><div className="grid2" style={{marginTop:8}}><div><div className="sub">domain_name</div><input className="input" value={newPolicyDomain} onChange={e=>setNewPolicyDomain(e.target.value)} placeholder="live-discovery-e2e"/></div><div><div className="sub">description</div><input className="input" value={newPolicyDescription} onChange={e=>setNewPolicyDescription(e.target.value)} placeholder="Policy discovery scope"/></div></div><div style={{marginTop:10,display:"flex",gap:8}}><button className="btn pri" onClick={handleCreatePolicySession} disabled={creatingPolicy}><I n="plus" s={14}/> {creatingPolicy?"Creating...":"New Policy"}</button><button className="btn ghost" onClick={()=>refreshPolicyRows()} disabled={policyLoading}><I n="refresh-cw" s={14}/> Refresh Sessions</button></div>{policyError?<div className="empty" style={{marginTop:8}}>{policyError}</div>:null}</section><section className="card"><div className="row"><strong>Policy Sessions</strong><span className="mut">GET /policy/sessions/{"{id}"}/state</span></div>{policyLoading?<div className="empty" style={{marginTop:8}}>Loading policy sessions...</div>:filteredPolicyRows.length?<div className="list" style={{marginTop:8}}>{filteredPolicyRows.map(r=><article className="item" key={r.sessionId}><div className="row"><div><div className="item-title">{r.domainName}</div><div className="sub mono">session_id: {r.sessionId}</div></div><span className={chipClass(r.status)}>{r.status}</span></div><div className="sub" style={{marginTop:4}}>fingerprint: <span className="mono">{r.fingerprint||"n/a"}</span></div><div className="sub">model: {r.modelName}</div><div className="prog"><div className="fill" style={{width:`${r.progress}%`}}/></div></article>)}</div>:<div className="empty" style={{marginTop:8}}>No sessions in this segment yet.</div>}</section></>;
const Episodes=()=> <><section className="card"><div className="ey">Episode Runner</div><div className="h1">Run policy-driven AI episode</div><div className="mut">Starts with POST /api/intent and then polls /api/run, /api/questions and /api/ready.</div></section><section className="card"><div className="row"><strong>Run Configuration</strong><span className="mut">write_scope: none</span></div><div className="grid2" style={{marginTop:8}}><div><div className="sub">Domain</div><input className="input" value={DOMAIN} readOnly/></div><div><div className="sub">Policy</div><input className="input" value="live-discovery-e2e" readOnly/></div></div><div style={{marginTop:8}}><div className="sub">User Query</div><textarea className="txt" value={episodeQuery} onChange={e=>setEpisodeQuery(e.target.value)} /></div><div style={{marginTop:10,display:"flex",gap:8}}><button className="btn pri" onClick={handleRunEpisode} disabled={episodeLoading}><I n="play" s={14}/> {episodeLoading?"Running...":"Run Episode"}</button><button className="btn ghost" onClick={()=>{setEpisodeError("");answersSentRef.current=false;answersSubmitInFlightRef.current=false;resultFetchedRef.current=false;setEpisodeState({decisionId:"",progress:0,steps:STEPS.map(()=>"idle"),terminal:"",runData:null,readyData:null,questions:[],startedAt:0,autoAnswered:false,answerText:""});if(pollTimerRef.current){clearInterval(pollTimerRef.current);pollTimerRef.current=null}setEpisodeLoading(false)}}><I n="rotate-ccw" s={14}/> Reset</button></div>{episodeError?<div className="empty" style={{marginTop:8}}>{episodeError}</div>:null}</section><section className="card"><div className="row"><strong>Pipeline Phases</strong><span className={chipClass(episodeState.terminal||(episodeLoading?"pending":"idle"))}>{episodeState.terminal||(episodeLoading?"running":"idle")}</span></div><div className="list" style={{marginTop:8}}>{STEPS.map((s,i)=>{const st=episodeState.steps[i]||"idle",tag=st==="done"?"d":st==="in_progress"?"p":"i";return <article className="phase" key={s[0]}><div className="pi"><I n={s[1]} s={14}/></div><div><div className="item-title">{s[0]}</div><div className="sub">{st==="done"?"Completed":st==="in_progress"?"In progress":"Idle"}</div></div><span className={`pt ${tag}`}>{tag==="p"?"in progress":tag==="d"?"done":"idle"}</span></article>})}</div><div className="prog" style={{marginTop:8}}><div className="fill" style={{width:`${episodeState.progress}%`}}/></div><div className="sub" style={{marginTop:6}}>Progress {episodeState.progress}%</div><div className="grid2" style={{marginTop:10}}><div className="item"><div className="sub">decision_id</div><div className="mono">{episodeState.decisionId||"-"}</div></div><div className="item"><div className="sub">eval result</div><div>{episodeState.runData?(episodeState.runData.passed===true?"passed":"failed"):"pending"}</div></div></div>{episodeState.readyData?<div className="item" style={{marginTop:8}}><div className="sub">truthpack ready</div><div className="mono">{String(episodeState.readyData.user_override_ref||"ready")}</div></div>:null}{episodeState.answerText?<div className="item" style={{marginTop:8}}><div className="sub">generated answer</div><div style={{whiteSpace:"pre-wrap"}}>{episodeState.answerText}</div></div>:null}</section></>;
const Models=()=> <><section className="card"><div className="ey">Routing</div><div className="h1">Model Manager</div><div className="mut">9 registry models + mamba model-runner. Status is derived from live dashboard reachability.</div></section><section className="grid3"><article className="card"><strong style={{font:"700 1.24rem var(--dsp)"}}>{modelCounts.online}</strong><div className="mut">Online</div></article><article className="card"><strong style={{font:"700 1.24rem var(--dsp)"}}>{modelCounts.idle}</strong><div className="mut">Idle</div></article><article className="card"><strong style={{font:"700 1.24rem var(--dsp)"}}>{modelCounts.offline}</strong><div className="mut">Offline</div></article></section><section className="card"><div className="row"><strong>Registry Models</strong><span className="mut">from platform config</span></div><div className="list" style={{marginTop:8}}>{modelRows.map(m=><article className="item" key={m.id}><div className="row"><div><div className="item-title">{m.label}</div><div className="sub">{m.type} - {m.model} - port {m.port}</div></div><span className={chipClass(m.status)}><span className={`dot ${m.status==="online"?"on":m.status==="idle"?"id":"of"}`}></span>{m.status}</span></div><div className="sub">tokens {m.tokens} - latency {m.latency}ms</div><div className="sub" style={{marginTop:4}}>GPU Load {m.gpuLoad}%</div><div className="prog"><div className="fill" style={{width:`${m.gpuLoad}%`}}/></div></article>)}</div></section></>;
return <div className="shell"><aside className="side"><div className="brand"><div className="ey">AI Command Center</div><div className="h1" style={{fontSize:"1.14rem",margin:"4px 0"}}>BabyAI</div><div className="mut">Governance Console</div></div><div className="nav">{TABS.map(t=><button key={t[0]} className={`navb ${tab===t[0]?"active":""}`} onClick={()=>setTab(t[0])}><span className="rowl"><I n={t[2]} s={15}/>{t[1]}</span><I n="chevron-right" s={14}/></button>)}</div><div className="item" style={{marginTop:"auto"}}><div className="sub">System Status</div><div style={{marginTop:6}} className={chipClass(healthPercent>=80?"online":healthPercent>0?"pending":"offline")}>{healthPercent>=80?"online":healthPercent>0?"degraded":"offline"}</div><div className="sub" style={{marginTop:6}}>{onlineServices}/{services.length||0} probes healthy</div></div></aside><main className="main"><header className="top"><div className="rowl"><I n="activity" s={16}/><strong>{(TABS.find(t=>t[0]===tab)||["","Dashboard"])[1]}</strong></div><div className="rowl"><I n="bell" s={16}/><I n="settings" s={16}/><span className="time">{clock}</span></div></header><div className="content">{tab==="dashboard"?<Dashboard/>:tab==="policies"?<Policies/>:tab==="episodes"?<Episodes/>:<Models/>}</div></main></div>}
ReactDOM.createRoot(document.getElementById("app")).render(<App/>);
</script>
</body>
</html>
