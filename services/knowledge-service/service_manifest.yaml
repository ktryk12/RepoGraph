# Service Manifest for knowledge-service
# ADR-0015: True Kafka-First Microservices - Phase 2: Database-per-Service

manifest_version: "1.0.0"
service_name: "knowledge-service"
last_updated: "2026-04-27"

# Service Identity
metadata:
  description: "Knowledge registry and librarian management service"
  owner_team: "babyai-core"
  repository: "https://github.com/babyai/babyai"
  service_tier: "tier_2"  # Supporting service

# Bounded Context Definition
bounded_context:
  name: "knowledge-platform"
  description: "Manages knowledge registry, librarian specifications, and knowledge ingestion tracking"
  domain: "knowledge"

  # Clear boundaries - what this service owns
  responsibilities:
    - "Librarian specification registry and lifecycle management"
    - "Knowledge ingestion tracking and audit trails"
    - "Namespace management for librarian instances"
    - "Snapshot versioning and reference tracking"
    - "Root path configuration and validation"
    - "Knowledge registry query and search operations"

  # What this service does NOT own
  boundaries:
    - "Actual knowledge content storage (content-service responsibility)"
    - "Knowledge retrieval and indexing (context-plane responsibility)"
    - "AI model inference on knowledge (expert-serving responsibility)"
    - "User authentication and permissions (authentication service responsibility)"

# Infrastructure Dependencies
infrastructure:
  database:
    type: "sqlite"
    database_file: "knowledge_registry.db"
    migrations_path: "migrations/"
    private_state: true

    # Migration from shared registry
    migration_source: "shared/babyai_shared/knowledge/registry.sqlite"
    migration_target: "services/knowledge-service/database/knowledge_registry.db"

  messaging:
    kafka_contract: "kafka_contract.yaml"
    primary_consumer_group: "knowledge-service-workers"

  external_dependencies:
    - service: "agent-platform"
      interaction: "kafka_events"
      topics: ["knowledge.librarian.requested.v1", "knowledge.librarian.updated.v1"]
      description: "Librarian specification management"

# Runtime Configuration
runtime:
  language: "python"
  framework: "fastapi"
  health_check: "/health"
  metrics_endpoint: "/metrics"

  deployment:
    min_replicas: 1
    max_replicas: 3
    cpu_request: "500m"
    memory_request: "1Gi"

  environment_variables:
    required:
      - "DATABASE_FILE"
      - "KAFKA_BOOTSTRAP_SERVERS"
    optional:
      - "MAX_LIBRARIANS"
      - "REGISTRY_BACKUP_INTERVAL"
      - "AUDIT_RETENTION_DAYS"

# API Contracts
apis:
  public:
    - type: "kafka_events"
      contract: "kafka_contract.yaml"
      description: "Primary interface for knowledge registry operations"

    - type: "rest_api"
      path: "/api/v1"
      description: "HTTP API for direct registry access"
      endpoints:
        - "GET /librarians"
        - "POST /librarians"
        - "GET /librarians/{namespace}"
        - "PUT /librarians/{namespace}"
        - "DELETE /librarians/{namespace}"
        - "GET /health"

  private:
    - type: "health_check"
      path: "/health"
      description: "Service health endpoint"

    - type: "metrics"
      path: "/metrics"
      description: "Prometheus metrics endpoint"

# Data Ownership
data:
  owned_entities:
    - "librarian_registry"
    - "librarian_snapshots"
    - "knowledge_audit_log"
    - "namespace_reservations"

  migrated_from:
    - source: "shared/babyai_shared/knowledge/registry.sqlite"
      target: "knowledge_registry.db"
      migration_strategy: "sqlite_consolidation_migration"
      migration_status: "phase_2_planned"

  shared_readonly:
    - "user_permissions"  # Read from authentication service

# Quality Attributes
quality:
  performance:
    target_latency_p95: "100ms"  # Registry operations
    target_throughput: "100 requests/minute"
    registry_backup_interval: "1h"

  reliability:
    target_availability: "99.5%"
    max_data_loss: "0%"
    consistency: "strong"  # Registry requires consistency

  scalability:
    horizontal_scaling: true
    stateless_design: false  # Maintains registry database
    read_replicas: "not_needed"  # Small dataset

# Compliance and Security
compliance:
  adr_0015_status: "phase_2_knowledge_extraction"

  checklist:
    bounded_context: "✅ Knowledge platform boundaries defined"
    database_per_service: "⏳ Migrating shared registry.sqlite to knowledge-service"
    kafka_communication: "⏳ Event contracts being created"
    service_manifest: "✅ This file"
    no_shared_state: "⏳ Extracting registry ownership from shared directory"
    explicit_contracts: "⏳ kafka_contract.yaml in progress"

  security:
    authentication: "kafka_ssl"
    authorization: "kafka_acl"
    data_encryption: "sqlite_encryption"

# Development and Operations
development:
  build_tool: "docker"
  test_framework: "pytest"
  test_coverage_target: "90%"

  ci_cd:
    pipeline: ".github/workflows/knowledge-service.yml"
    deployment_strategy: "rolling_update"

  monitoring:
    logs: "structured_json"
    metrics: "prometheus"
    tracing: "jaeger"
    alerting: "pagerduty"

# Migration Status
migration:
  current_phase: "phase_2_knowledge_registry_extraction"
  migration_priority: "medium"

  completed:
    - "Bounded context analysis"
    - "Service manifest definition"

  in_progress:
    - "Database schema design"
    - "Migration service implementation"
    - "Kafka contract definition"
    - "Event-driven API design"

  planned:
    - "Registry database consolidation"
    - "Replace agent-platform direct access with events"
    - "Registry backup and recovery"
    - "Performance optimization"

# Performance Characteristics
performance:
  database:
    connection_pool_size: 5
    max_connections: 20
    query_timeout_seconds: 10

  registry:
    max_librarians: 1000
    namespace_length_limit: 100
    path_array_length_limit: 50

  caching:
    registry_cache_ttl_seconds: 300
    hot_librarians_cache_size: 100

# Documentation
documentation:
  architecture: "docs/services/knowledge-service/README.md"
  api_docs: "docs/services/knowledge-service/api.md"
  migration_guide: "docs/services/knowledge-service/migration.md"