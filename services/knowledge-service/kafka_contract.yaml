# Kafka Contract for knowledge-service
# ADR-0015: True Kafka-First Microservices - Phase 2: Database-per-Service

contract_version: "1.0.0"
service_name: "knowledge-service"
envelope_version: "v1"
last_updated: "2026-04-27"

# Core responsibility: Knowledge registry and librarian management
bounded_context: "knowledge-platform"

# Consumer Contracts - Events this service listens to
consumers:
  # Librarian registration requests from agent-platform
  - topic: knowledge.librarian.register.v1
    description: "Register new librarian specification"
    schema_path: schemas/knowledge/librarian_register_v1.json
    consumer_group: "knowledge-service-workers"
    dlq_topic: knowledge.librarian.register.v1.dlq
    idempotency_strategy: "namespace"
    phase: "2"
    migration_notes: "Replaces direct KnowledgeRegistry.upsert_librarian calls"

  # Librarian update requests
  - topic: knowledge.librarian.update.v1
    description: "Update existing librarian specification"
    schema_path: schemas/knowledge/librarian_update_v1.json
    consumer_group: "knowledge-service-workers"
    dlq_topic: knowledge.librarian.update.v1.dlq
    idempotency_strategy: "namespace_snapshot"
    phase: "2"

  # Librarian query requests
  - topic: knowledge.librarian.query.v1
    description: "Query librarian registry for specifications"
    schema_path: schemas/knowledge/librarian_query_v1.json
    consumer_group: "knowledge-service-workers"
    dlq_topic: knowledge.librarian.query.v1.dlq
    idempotency_strategy: "correlation_id"
    phase: "2"

  # Librarian deletion requests
  - topic: knowledge.librarian.delete.v1
    description: "Delete librarian from registry"
    schema_path: schemas/knowledge/librarian_delete_v1.json
    consumer_group: "knowledge-service-workers"
    dlq_topic: knowledge.librarian.delete.v1.dlq
    idempotency_strategy: "namespace"
    phase: "2"

# Producer Contracts - Events this service publishes
producers:
  # Librarian registration responses
  - topic: knowledge.librarian.registered.v1
    description: "Librarian successfully registered in registry"
    schema_path: schemas/knowledge/librarian_registered_v1.json
    dlq_topic: knowledge.librarian.registered.v1.dlq
    phase: "2"
    migration_notes: "Replaces direct KnowledgeRegistry return values"

  # Librarian update responses
  - topic: knowledge.librarian.updated.v1
    description: "Librarian specification updated"
    schema_path: schemas/knowledge/librarian_updated_v1.json
    dlq_topic: knowledge.librarian.updated.v1.dlq
    phase: "2"

  # Librarian query responses
  - topic: knowledge.librarian.query.result.v1
    description: "Results from librarian registry query"
    schema_path: schemas/knowledge/librarian_query_result_v1.json
    dlq_topic: knowledge.librarian.query.result.v1.dlq
    phase: "2"

  # Librarian deletion responses
  - topic: knowledge.librarian.deleted.v1
    description: "Librarian removed from registry"
    schema_path: schemas/knowledge/librarian_deleted_v1.json
    dlq_topic: knowledge.librarian.deleted.v1.dlq
    phase: "2"

  # Registry audit events
  - topic: knowledge.registry.audit.v1
    description: "Audit trail for all registry operations"
    schema_path: schemas/knowledge/registry_audit_v1.json
    dlq_topic: knowledge.registry.audit.v1.dlq
    phase: "2"
    migration_notes: "New audit capability not available in direct access"

  # Registry snapshot events
  - topic: knowledge.registry.snapshot.v1
    description: "Registry backup and snapshot events"
    schema_path: schemas/knowledge/registry_snapshot_v1.json
    dlq_topic: knowledge.registry.snapshot.v1.dlq
    phase: "2"

  # Namespace reservation events
  - topic: knowledge.namespace.reserved.v1
    description: "Namespace reserved or released"
    schema_path: schemas/knowledge/namespace_reserved_v1.json
    dlq_topic: knowledge.namespace.reserved.v1.dlq
    phase: "2"
    migration_notes: "New namespace management capability"

# Legacy Support - During migration from shared registry
legacy_support:
  # HTTP API for migration compatibility
  http_endpoints:
    - path: "/api/v1/librarians"
      methods: ["GET", "POST"]
      phase_out: "Phase 3"
      migration_target: "knowledge.librarian.* events"
      notes: "Direct registry access for services not yet using events"

    - path: "/api/v1/librarians/{namespace}"
      methods: ["GET", "PUT", "DELETE"]
      phase_out: "Phase 3"
      migration_target: "knowledge.librarian.* events"
      notes: "Individual librarian operations during migration"

  # Database migration from shared registry
  database_migration:
    - source: "shared/babyai_shared/knowledge/registry.sqlite"
      target: "services/knowledge-service/database/knowledge_registry.db"
      migration_strategy: "sqlite_consolidation"
      phase_out: "End of Phase 2"
      compatibility_layer: "dual_write_during_migration"

# DLQ and Reliability Patterns
dlq_patterns:
  poison_message_topic: "system.dlq.poison.v1"
  retry_topic: "system.retry.scheduled.v1"
  max_retries: 3  # Registry operations should be quick
  retry_backoff: "exponential"
  dlq_retention_hours: 168  # 7 days

# Idempotency and Reliability
reliability:
  idempotency_key_source: "namespace"
  duplicate_detection_window_hours: 24
  message_ordering: "partition_key_based"
  partition_key_strategy: "namespace"
  consistency_model: "strong"  # Registry requires strong consistency

# Phase 2 Migration Checklist
migration_phase_2:
  current_state:
    - "⏳ SQLite database extraction in progress"
    - "⏳ Service boundaries being defined"
    - "⏳ Event schemas being created"
    - "⏳ Migration service being implemented"

  target_state:
    - "⏳ Knowledge registry database fully owned by knowledge-service"
    - "⏳ All registry operations use knowledge-service events"
    - "⏳ agent-platform no longer accesses shared registry.sqlite"
    - "⏳ Registry audit trail and backup capabilities"
    - "⏳ Namespace management and validation"

# Schema Validation Requirements
validation:
  envelope_validation: true
  payload_validation: true
  schema_registry_integration: false  # Phase 3+
  backward_compatibility: true
  namespace_validation: true

# Database Migration Strategy
database_migration:
  strategy: "sqlite_consolidation_with_enhancement"

  migration_phases:
    1. "Extract shared registry.sqlite to knowledge-service ownership"
    2. "Add audit trails and enhanced schema"
    3. "Implement event-driven API alongside direct access"
    4. "Migrate agent-platform to use events"
    5. "Validate registry operations and performance"
    6. "Remove shared registry access"
    7. "Add backup and recovery capabilities"

  data_validation:
    - "Registry record count verification"
    - "Librarian specification integrity validation"
    - "Namespace uniqueness verification"
    - "JSON path validation for root_paths"

# Observability and Monitoring
observability:
  correlation_id_propagation: required
  distributed_tracing: "enabled"
  topic_metrics: ["message_rate", "error_rate", "latency_p95", "registry_size"]
  dlq_alerting: "enabled"

  knowledge_specific_metrics:
    - "registry_operation_duration"
    - "librarian_count"
    - "namespace_utilization"
    - "registry_backup_success_rate"
    - "query_response_time"

# Performance Requirements
performance:
  registry_operations:
    target_latency_p95: "100ms"
    max_librarians: 1000
    concurrent_requests: 20

  database:
    connection_pool_size: 5
    query_timeout: "10s"
    max_result_size: "1MB"

  backup:
    backup_interval_hours: 1
    backup_retention_days: 30
    backup_size_limit: "100MB"

# Phase 2 Success Criteria
success_criteria:
  - "Knowledge registry extracted from shared directory to knowledge-service"
  - "All registry operations use knowledge-service events or API"
  - "agent-platform no longer has direct registry.sqlite access"
  - "Registry audit trail captures all operations"
  - "Backup and recovery capabilities operational"
  - "Zero registry data loss during migration process"
  - "Registry operation latency remains under 100ms P95"
  - "Namespace management and validation working"