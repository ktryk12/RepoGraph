# Service Manifest for truth-service
# ADR-0015: True Kafka-First Microservices - Phase 2: Database-per-Service

manifest_version: "1.0.0"
service_name: "truth-service"
last_updated: "2026-04-27"

# Service Identity
metadata:
  description: "Truth management and proposal lifecycle service"
  owner_team: "babyai-core"
  repository: "https://github.com/babyai/babyai"
  service_tier: "tier_1"  # Critical path service

# Bounded Context Definition
bounded_context:
  name: "truth-management"
  description: "Manages truth assertions, proposals, and fact verification lifecycle"
  domain: "truth"

  # Clear boundaries - what this service owns
  responsibilities:
    - "Truth assertion storage and retrieval"
    - "Proposal lifecycle management"
    - "Fact verification workflows"
    - "Truth graph maintenance"
    - "Proposal approval/rejection tracking"
    - "Historical truth versioning"

  # What this service does NOT own
  boundaries:
    - "Fact-checking logic (agent-platform responsibility)"
    - "Evidence gathering (agent-platform responsibility)"
    - "User interfaces (ui-service responsibility)"
    - "Decision making (orchestrator-worker responsibility)"

# Infrastructure Dependencies
infrastructure:
  database:
    type: "sqlite"
    schema: "truth_service"
    database_file: "database/truth.db"
    migrations_path: "database/migrations/"
    private_state: true

  messaging:
    kafka_contract: "kafka_contract.yaml"
    primary_consumer_group: "truth-service-workers"

  external_dependencies: []  # Self-contained service

# Runtime Configuration
runtime:
  language: "python"
  framework: "fastapi"
  health_check: "/health"
  metrics_endpoint: "/metrics"

  deployment:
    min_replicas: 1
    max_replicas: 3
    cpu_request: "200m"
    memory_request: "512Mi"

  environment_variables:
    required:
      - "DATABASE_PATH"
      - "KAFKA_BOOTSTRAP_SERVERS"
    optional:
      - "TRUTH_RETENTION_DAYS"
      - "PROPOSAL_EXPIRY_HOURS"

# API Contracts
apis:
  public:
    - type: "kafka_events"
      contract: "kafka_contract.yaml"
      description: "Primary interface for truth management"

    - type: "rest_api"
      path: "/api/v1"
      description: "HTTP API for migration compatibility"
      endpoints:
        - "GET /facts"
        - "POST /facts"
        - "GET /proposals"
        - "POST /proposals"
        - "PUT /proposals/{id}/status"

  private:
    - type: "health_check"
      path: "/health"
      description: "Service health endpoint"

    - type: "metrics"
      path: "/metrics"
      description: "Prometheus metrics endpoint"

# Data Ownership
data:
  owned_entities:
    - "truth_facts"
    - "truth_proposals"
    - "proposal_lifecycle"
    - "truth_versions"
    - "fact_relationships"

  migrated_from:
    - source: "shared/babyai_shared/truth/facts.sqlite"
      target: "database/truth.db/facts"
      migration_strategy: "consolidate_and_migrate"

    - source: "shared/babyai_shared/truth/proposals.sqlite"
      target: "database/truth.db/proposals"
      migration_strategy: "consolidate_and_migrate"

    - source: "libs/truth/facts.sqlite"
      target: "database/truth.db/facts"
      migration_strategy: "merge_duplicates"

    - source: "libs/truth/proposals.sqlite"
      target: "database/truth.db/proposals"
      migration_strategy: "merge_duplicates"

# Quality Attributes
quality:
  performance:
    target_latency_p95: "100ms"  # Truth lookup
    target_throughput: "1000 requests/minute"

  reliability:
    target_availability: "99.9%"
    max_data_loss: "0%"
    consistency: "strong"

  scalability:
    horizontal_scaling: true
    stateless_design: false  # Maintains truth database
    read_replicas: "supported"

# Compliance and Security
compliance:
  adr_0015_status: "phase_2_extraction"

  checklist:
    bounded_context: "✅ Truth management boundaries defined"
    database_per_service: "✅ Private SQLite database"
    kafka_communication: "⏳ Event contracts defined"
    service_manifest: "✅ This file"
    no_shared_state: "⏳ Migrating from shared databases"
    explicit_contracts: "⏳ kafka_contract.yaml in progress"

  security:
    authentication: "kafka_ssl"
    authorization: "kafka_acl"
    data_encryption: "sqlite_encryption"

# Development and Operations
development:
  build_tool: "docker"
  test_framework: "pytest"
  test_coverage_target: "90%"

  ci_cd:
    pipeline: ".github/workflows/truth-service.yml"
    deployment_strategy: "blue_green"

  monitoring:
    logs: "structured_json"
    metrics: "prometheus"
    tracing: "jaeger"
    alerting: "pagerduty"

# Migration Status
migration:
  current_phase: "phase_2_database_extraction"
  migration_priority: "high"

  completed:
    - "Service structure created"
    - "Bounded context defined"
    - "Service manifest created"

  in_progress:
    - "Database schema design"
    - "Kafka contract creation"
    - "Data migration planning"

  planned:
    - "Shared database migration"
    - "Event-driven API implementation"
    - "Legacy compatibility layer"
    - "Service deployment"

# Documentation
documentation:
  architecture: "docs/services/truth-service/README.md"
  api_docs: "docs/services/truth-service/api.md"
  migration_guide: "docs/services/truth-service/migration.md"
  troubleshooting: "docs/services/truth-service/troubleshooting.md"