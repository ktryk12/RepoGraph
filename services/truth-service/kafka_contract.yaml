# Kafka Contract for truth-service
# ADR-0015: True Kafka-First Microservices - Phase 2: Database-per-Service

contract_version: "1.0.0"
service_name: "truth-service"
envelope_version: "v1"
last_updated: "2026-04-27"

# Core responsibility: Truth management and proposal lifecycle
bounded_context: "truth-management"

# Consumer Contracts - Events this service listens to
consumers:
  # Proposal lifecycle events
  - topic: truth.proposal.submit.v1
    description: "New truth proposal submitted for review"
    schema_path: schemas/truth/proposal_submit_v1.json
    consumer_group: "truth-service-workers"
    dlq_topic: truth.proposal.submit.v1.dlq
    idempotency_strategy: "correlation_id"
    phase: "2"

  - topic: truth.proposal.approve.v1
    description: "Proposal approved for inclusion in truth base"
    schema_path: schemas/truth/proposal_approve_v1.json
    consumer_group: "truth-service-workers"
    dlq_topic: truth.proposal.approve.v1.dlq
    idempotency_strategy: "correlation_id"
    phase: "2"

  - topic: truth.proposal.reject.v1
    description: "Proposal rejected with reason"
    schema_path: schemas/truth/proposal_reject_v1.json
    consumer_group: "truth-service-workers"
    dlq_topic: truth.proposal.reject.v1.dlq
    idempotency_strategy: "correlation_id"
    phase: "2"

# Producer Contracts - Events this service publishes
producers:
  # Truth management events
  - topic: truth.fact.created.v1
    description: "New truth fact established"
    schema_path: schemas/truth/fact_created_v1.json
    dlq_topic: truth.fact.created.v1.dlq
    migration_notes: "Replaces direct facts.sqlite access"

  - topic: truth.fact.updated.v1
    description: "Existing truth fact updated"
    schema_path: schemas/truth/fact_updated_v1.json
    dlq_topic: truth.fact.updated.v1.dlq
    phase: "2"

  - topic: truth.fact.deprecated.v1
    description: "Truth fact marked as deprecated"
    schema_path: schemas/truth/fact_deprecated_v1.json
    dlq_topic: truth.fact.deprecated.v1.dlq
    phase: "2"

  # Proposal lifecycle events
  - topic: truth.proposal.received.v1
    description: "Truth proposal received and queued for review"
    schema_path: schemas/truth/proposal_received_v1.json
    dlq_topic: truth.proposal.received.v1.dlq
    migration_notes: "Replaces direct proposals.sqlite access"

  - topic: truth.proposal.validated.v1
    description: "Proposal passed validation checks"
    schema_path: schemas/truth/proposal_validated_v1.json
    dlq_topic: truth.proposal.validated.v1.dlq
    phase: "2"

  - topic: truth.proposal.completed.v1
    description: "Proposal processing completed (approved or rejected)"
    schema_path: schemas/truth/proposal_completed_v1.json
    dlq_topic: truth.proposal.completed.v1.dlq
    phase: "2"

  # Query response events
  - topic: truth.query.response.v1
    description: "Response to truth query request"
    schema_path: schemas/truth/query_response_v1.json
    dlq_topic: truth.query.response.v1.dlq
    phase: "2"

# Legacy Support - During migration period
legacy_support:
  # HTTP API for migration compatibility
  http_endpoints:
    - path: "/api/v1/facts"
      methods: ["GET", "POST"]
      phase_out: "Phase 3"
      migration_target: "truth.fact.created.v1 events"
      notes: "Temporary endpoint for agent-platform migration"

    - path: "/api/v1/proposals"
      methods: ["GET", "POST", "PUT"]
      phase_out: "Phase 3"
      migration_target: "truth.proposal.* events"
      notes: "Temporary endpoint for agent-platform migration"

  # Database file compatibility (Phase 2 only)
  database_compatibility:
    - source: "shared/babyai_shared/truth/facts.sqlite"
      compatibility_layer: "read_only_proxy"
      phase_out: "End of Phase 2"
      migration_strategy: "dual_write_then_cutover"

    - source: "shared/babyai_shared/truth/proposals.sqlite"
      compatibility_layer: "read_only_proxy"
      phase_out: "End of Phase 2"
      migration_strategy: "dual_write_then_cutover"

# DLQ and Reliability Patterns
dlq_patterns:
  poison_message_topic: "system.dlq.poison.v1"
  retry_topic: "system.retry.scheduled.v1"
  max_retries: 3
  retry_backoff: "exponential"
  dlq_retention_hours: 168  # 7 days

# Idempotency and Reliability
reliability:
  idempotency_key_source: "correlation_id"
  duplicate_detection_window_hours: 24
  message_ordering: "partition_key_based"
  partition_key_strategy: "truth_id"
  consistency_model: "strong"  # Truth requires strong consistency

# Phase 2 Migration Checklist
migration_phase_2:
  current_state:
    - "✅ Service manifest created"
    - "✅ Kafka contract defined"
    - "⏳ Database schema design in progress"
    - "⏳ Event schemas pending"

  target_state:
    - "⏳ Consolidated truth database operational"
    - "⏳ All truth events use envelope v1 format"
    - "⏳ Legacy database access replaced with events"
    - "⏳ Dual-write migration completed"
    - "⏳ agent-platform migrated to truth events"

# Schema Validation Requirements
validation:
  envelope_validation: true
  payload_validation: true
  schema_registry_integration: false  # Phase 3+
  backward_compatibility: true

# Data Migration Strategy
data_migration:
  strategy: "consolidate_and_migrate"

  source_databases:
    - "shared/babyai_shared/truth/facts.sqlite"
    - "shared/babyai_shared/truth/proposals.sqlite"
    - "libs/truth/facts.sqlite"
    - "libs/truth/proposals.sqlite"

  target_schema:
    - "truth_facts table with unified schema"
    - "truth_proposals table with lifecycle tracking"
    - "truth_relationships table for fact dependencies"
    - "truth_versions table for change history"

  migration_phases:
    1. "Schema analysis and consolidation design"
    2. "Create unified truth database schema"
    3. "Implement dual-write proxy for compatibility"
    4. "Migrate historical data with deduplication"
    5. "Validate data integrity and completeness"
    6. "Cut over services to use truth-service events"
    7. "Remove legacy database files and proxy"

# Observability and Monitoring
observability:
  correlation_id_propagation: required
  distributed_tracing: "enabled"
  topic_metrics: ["message_rate", "error_rate", "latency_p95", "data_consistency"]
  dlq_alerting: "enabled"

  truth_specific_metrics:
    - "fact_creation_rate"
    - "proposal_approval_rate"
    - "query_response_time"
    - "database_consistency_checks"

# Phase 2 Success Criteria
success_criteria:
  - "All shared truth databases migrated to truth-service"
  - "agent-platform uses truth events instead of direct database access"
  - "No data loss during migration"
  - "Truth queries maintain <100ms P95 latency"
  - "Strong consistency maintained for all truth operations"
  - "Legacy compatibility layer operational during transition"