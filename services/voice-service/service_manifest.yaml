service_name: voice-service
service_type: media
owner_boundary: ai-ml-pipeline
exposes_http: true
uses_kafka: true
owns_database: true
allowed_external_apis:
  - speech_recognition_models
  - text_to_speech_models
depends_on_services:
  - config-service
allowed_shared_imports:
  - babyai_shared.kafka
  - babyai_shared.logging
  - babyai_shared.health
  - babyai_shared.storage
  - babyai_shared.mcp
notes: Voice processing service with STT/TTS capabilities. Includes MCP server for Claude Desktop integration.